<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Be First Lady — Print Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Playfair+Display:wght@400;500;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Marck+Script&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">
<!-- Libraries for export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
:root{
  --cream-50:#fbf7ef; --cream-100:#f6eee0; --cream-200:#ece1cc;
  --cream-300:#dfd0b5; --cream-400:#c9b690;
  --gold:#7d613b; --gold-light:#c9a96e; --gold-deep:#5a4628;
  --burnt:#b04a1a; --ink:#2a1c10; --ink-soft:#6b5a42;
  --bg-app:#1a1209;
  --bg-panel:#241710;
  --bg-card:#2d1d13;
  --border:rgba(201,169,110,.18);
  --border-strong:rgba(201,169,110,.35);
  --text:#e8d4b0;
  --text-soft:#a08664;
  --font-ar-display:'Amiri',serif;
  --font-ar-body:'Cairo',sans-serif;
  --font-en-display:'Cormorant Garamond',serif;
  --font-en-body:'Lora',Georgia,serif;
  --font-script:'Tangerine',cursive;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font-ar-body);background:var(--bg-app);color:var(--text);-webkit-font-smoothing:antialiased}

.app{
  display:grid;
  grid-template-columns: 280px 1fr 320px;
  grid-template-rows: 56px 1fr;
  grid-template-areas: "header header header" "sidebar canvas panel";
  height:100vh;
}

header.topbar{
  grid-area:header;
  background:linear-gradient(180deg, #2d1d13, #1a1209);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;z-index:50;position:relative;
}
.brand-mini{display:flex;align-items:center;gap:10px}
.brand-mini svg{width:28px;height:28px;color:var(--gold-light)}
.brand-mini-text{font-family:var(--font-en-display);font-size:16px;color:var(--cream-50)}
.brand-mini-text em{font-style:italic;color:var(--gold-light);font-weight:300}
.brand-mini-sub{
  font-family:var(--font-en-display);font-style:italic;font-size:10px;
  letter-spacing:2px;color:var(--text-soft);text-transform:uppercase;
  margin-right:auto;padding-right:12px;border-right:1px solid var(--border);
}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;
  font-family:var(--font-ar-body);font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--bg-card);color:var(--text);transition:all .2s;
}
.btn:hover{border-color:var(--gold-light);color:var(--cream-50)}
.btn svg{width:13px;height:13px}
.btn-primary{background:linear-gradient(135deg, var(--gold), var(--gold-deep));color:var(--cream-50);border-color:var(--gold)}
.btn-primary:hover{filter:brightness(1.1);color:var(--cream-50)}

/* ═══════════ SIDEBAR — Template categories ═══════════ */
aside.sidebar{
  grid-area:sidebar;background:var(--bg-panel);
  border-left:1px solid var(--border);overflow-y:auto;padding:14px 0;
}
.sidebar-section{margin-bottom:8px}
.sidebar-title{
  font-family:var(--font-en-display);font-style:italic;font-size:10px;
  letter-spacing:2.5px;color:var(--gold);text-transform:uppercase;
  padding:8px 18px 6px;border-bottom:1px solid var(--border);margin-bottom:6px;
}
.template-tile{
  margin:0 12px 8px;padding:14px 14px;border-radius:8px;background:var(--bg-card);
  border:1px solid var(--border);cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:10px;
}
.template-tile:hover{border-color:var(--gold-light);transform:translateX(-3px)}
.template-tile.active{background:rgba(201,169,110,.12);border-color:var(--gold-light)}
.template-tile-icon{
  width:38px;height:38px;border-radius:6px;background:rgba(201,169,110,.08);
  display:flex;align-items:center;justify-content:center;color:var(--gold-light);flex-shrink:0;
}
.template-tile-icon svg{width:22px;height:22px}
.template-tile-meta{flex:1;min-width:0}
.template-tile-name{font-size:13px;font-weight:600;color:var(--cream-50);margin-bottom:2px;line-height:1.3}
.template-tile-size{
  font-family:var(--font-en-display);font-style:italic;font-size:10px;
  letter-spacing:1.5px;color:var(--text-soft);text-transform:uppercase;
}

/* ═══════════ CANVAS AREA ═══════════ */
main.canvas-area{
  grid-area:canvas;
  background:radial-gradient(ellipse at center, #2d1d13 0%, #150b06 100%);
  display:flex;flex-direction:column;overflow:hidden;position:relative;
}
.canvas-toolbar{
  display:flex;align-items:center;gap:12px;padding:10px 20px;
  background:rgba(0,0,0,.2);border-bottom:1px solid var(--border);
  font-size:11px;flex-wrap:wrap;
}
.tool-group{display:flex;gap:4px;align-items:center;padding:0 8px;border-left:1px solid var(--border)}
.tool-group:first-child{border-left:none}
.tool-group-label{
  font-family:var(--font-en-display);font-style:italic;font-size:10px;
  letter-spacing:1.5px;color:var(--text-soft);text-transform:uppercase;margin-left:6px;
}
.zoom-display{font-family:var(--font-en-body);font-size:11px;min-width:42px;text-align:center;color:var(--text-soft)}
.icon-btn{
  width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;
  border-radius:4px;cursor:pointer;color:var(--text-soft);background:transparent;
  border:1px solid transparent;transition:all .15s;
}
.icon-btn:hover{color:var(--cream-50);background:rgba(201,169,110,.08);border-color:var(--border)}
.icon-btn svg{width:15px;height:15px}

.canvas-viewport{
  flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;
  padding:40px;position:relative;
}
.doc-stage{
  position:relative;transform-origin:top center;transition:transform .25s ease-out;
}
.doc-page{
  position:relative;background:#fff;box-shadow:0 20px 60px rgba(0,0,0,.5);overflow:hidden;
}

/* ═══════════ PANEL ═══════════ */
aside.panel{
  grid-area:panel;background:var(--bg-panel);
  border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;
}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(0,0,0,.15)}
.panel-tab{
  flex:1;padding:11px 8px;text-align:center;cursor:pointer;
  font-family:var(--font-en-display);font-style:italic;font-size:10px;
  letter-spacing:1.5px;color:var(--text-soft);text-transform:uppercase;
  border-bottom:2px solid transparent;transition:all .15s;
}
.panel-tab:hover{color:var(--cream-50)}
.panel-tab.active{color:var(--gold-light);border-bottom-color:var(--gold-light);background:rgba(201,169,110,.05)}
.panel-content{flex:1;overflow-y:auto;padding:16px}
.panel-section{margin-bottom:18px}
.panel-section-title{
  font-family:var(--font-en-display);font-style:italic;font-size:10px;
  letter-spacing:2px;color:var(--gold);text-transform:uppercase;
  margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--border);
}
.control-row{margin-bottom:12px}
.control-label{display:block;font-size:11px;color:var(--text-soft);margin-bottom:5px;font-weight:500}
.control-input,.control-textarea,.control-select{
  width:100%;padding:7px 10px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:4px;color:var(--cream-50);font-family:var(--font-ar-body);font-size:12px;
  outline:none;transition:border-color .15s;
}
.control-input:focus,.control-textarea:focus,.control-select:focus{border-color:var(--gold-light)}
.control-textarea{resize:vertical;min-height:60px;font-family:var(--font-ar-body);line-height:1.6}
.control-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.color-pickers{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.color-swatch{
  width:100%;aspect-ratio:1;border-radius:4px;cursor:pointer;
  border:2px solid transparent;transition:transform .15s;position:relative;
}
.color-swatch:hover{transform:scale(1.08)}
.color-swatch.active{border-color:var(--gold-light);transform:scale(1.05)}
.color-swatch.active::after{
  content:"✓";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:#fff;text-shadow:0 0 4px rgba(0,0,0,.5);font-size:14px;font-weight:700;
}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.toggle-row-label{font-size:12px;color:var(--text)}
.toggle{
  position:relative;width:36px;height:20px;background:var(--bg-card);border-radius:10px;
  cursor:pointer;transition:background .2s;border:1px solid var(--border);
}
.toggle.on{background:var(--gold);border-color:var(--gold)}
.toggle::after{
  content:"";position:absolute;top:2px;right:2px;width:14px;height:14px;
  background:var(--cream-50);border-radius:50%;transition:transform .2s;
}
.toggle.on::after{transform:translateX(-16px)}

/* ═══════════ DOC CONTENT — EDITABLE ═══════════ */
.doc-field{
  outline:none;border-radius:2px;transition:background .15s;
  cursor:text;
}
.doc-field:hover{background:rgba(201,169,110,.06)}
.doc-field:focus{background:rgba(201,169,110,.1);outline:1px dashed var(--gold-light);outline-offset:2px}
.doc-field.field-selected{
  background:rgba(201,169,110,.15);
  outline:2px solid var(--gold-light);
  outline-offset:3px;
  box-shadow:0 0 0 4px rgba(201,169,110,.1);
}
.doc-field.field-dragging{
  cursor:grabbing !important;
  background:rgba(125,97,59,.3) !important;
  outline:2px solid var(--gold) !important;
  outline-offset:4px !important;
  box-shadow:0 12px 32px rgba(0,0,0,.45) !important;
  transition:none !important;
  z-index:100;
  opacity:0.95;
}

/* ═══════════ STAMP / SEAL ═══════════ */
.stamp-overlay{
  position:absolute;
  cursor:move;
  user-select:none;
  z-index:50;
}
.stamp-overlay.dragging{opacity:0.7}
.stamp-overlay svg{width:100%;height:100%;display:block}
.stamp-overlay.selected{outline:2px dashed var(--gold-light);outline-offset:4px}
.stamp-handle{
  position:absolute;width:10px;height:10px;background:#fff;border:2px solid var(--gold-light);
  border-radius:50%;
}
.stamp-handle.br{bottom:-5px;right:-5px;cursor:nwse-resize}

/* ═══════════ MODAL ═══════════ */
.modal{
  position:fixed;inset:0;background:rgba(20,12,6,.95);z-index:100;display:none;
  overflow-y:auto;padding:30px 20px;
}
.modal.open{display:block}
.modal-inner{max-width:900px;margin:0 auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.modal-title{font-family:var(--font-ar-display);font-size:24px;color:var(--cream-50);font-weight:700}
.modal-close{
  background:none;border:1px solid var(--border);color:var(--text);padding:8px 16px;
  border-radius:6px;cursor:pointer;font-family:var(--font-ar-body);font-size:12px;
}
.modal-close:hover{border-color:var(--gold-light);color:var(--cream-50)}

/* ═══════════ TOAST ═══════════ */
.toast{
  position:fixed;bottom:30px;right:50%;
  transform:translateX(50%) translateY(80px);
  background:var(--gold-deep);color:var(--cream-50);padding:10px 20px;border-radius:30px;
  font-family:var(--font-ar-body);font-size:12px;z-index:1000;opacity:0;
  transition:all .3s ease-out;box-shadow:0 10px 30px rgba(0,0,0,.4);
  border:1px solid var(--gold-light);
}
.toast.show{opacity:1;transform:translateX(50%) translateY(0)}

/* ═══════════ MOBILE WARN (REMOVED — now responsive) ═══════════ */
.mobile-warn{ display:none !important; }

/* ═══════════ MOBILE RESPONSIVE LAYOUT ═══════════ */
@media (max-width: 900px){
  /* App becomes a single column with overlays */
  .app{
    grid-template-columns: 1fr;
    grid-template-rows: 52px 1fr;
    grid-template-areas: "header" "canvas";
  }
  
  /* Topbar — compact */
  header.topbar{
    padding: 0 10px;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  header.topbar::-webkit-scrollbar { display: none; }
  
  .brand-mini svg{width:24px;height:24px}
  .brand-mini-text{font-size:14px}
  .brand-mini-sub{display:none}
  
  .topbar-actions{gap: 4px; flex-shrink: 0}
  .topbar-actions .btn{
    padding: 6px 10px;
    font-size: 11px;
    white-space: nowrap;
  }
  .topbar-actions .btn svg{width:12px;height:12px}
  
  /* Sidebar → slide-in drawer from right */
  aside.sidebar{
    position: fixed;
    top: 52px;
    right: 0;
    bottom: 0;
    width: 260px;
    max-width: 80vw;
    z-index: 90;
    transform: translateX(100%);
    transition: transform .25s ease-out;
    border-left: 1px solid var(--border);
    box-shadow: -10px 0 30px rgba(0,0,0,.5);
  }
  aside.sidebar.open{ transform: translateX(0); }
  
  /* Panel → slide-up bottom sheet */
  aside.panel{
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 65vh;
    max-height: 65vh;
    z-index: 95;
    border-right: none;
    border-top: 1px solid var(--border);
    transform: translateY(100%);
    transition: transform .3s ease-out;
    border-radius: 18px 18px 0 0;
    box-shadow: 0 -10px 30px rgba(0,0,0,.5);
  }
  aside.panel.open{ transform: translateY(0); }
  
  /* Drag handle on top of bottom sheet */
  aside.panel::before{
    content: '';
    display: block;
    width: 44px;
    height: 4px;
    background: var(--gold-light);
    border-radius: 2px;
    margin: 8px auto 4px;
    opacity: 0.6;
  }
  
  .panel-tabs{ padding-top: 4px; }
  .panel-tab{ padding: 12px 6px; font-size: 11px; }
  .panel-content{ padding: 14px; padding-bottom: 80px; }
  
  /* Canvas — full screen */
  main.canvas-area{
    grid-area: canvas;
  }
  .canvas-toolbar{
    padding: 6px 10px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    gap: 6px;
    flex-wrap: nowrap;
  }
  .canvas-toolbar::-webkit-scrollbar { display: none; }
  .tool-group{ padding: 0 6px; flex-shrink: 0 }
  .tool-group-label{ font-size: 9px; }
  
  .canvas-viewport{
    padding: 16px 12px 16px;
  }
  
  /* Bottom floating action bar for mobile */
  .mobile-fab-bar{
    display: flex;
    position: fixed;
    bottom: 12px;
    left: 12px;
    right: 12px;
    z-index: 50;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 8px;
    gap: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    justify-content: space-around;
  }
  .mobile-fab{
    flex: 1;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2px;
    border: none;
    background: transparent;
    color: var(--text-soft);
    border-radius: 20px;
    cursor: pointer;
    transition: all .15s;
  }
  .mobile-fab.active{
    background: rgba(201,169,110,.18);
    color: var(--gold-light);
  }
  .mobile-fab svg{ width: 18px; height: 18px; }
  .mobile-fab-label{
    font-size: 9px;
    font-family: var(--font-ar-body);
    font-weight: 600;
  }
  
  /* Backdrop when drawers open */
  .mobile-backdrop{
    position: fixed;
    inset: 52px 0 0 0;
    background: rgba(0,0,0,.5);
    z-index: 85;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .mobile-backdrop.show{
    opacity: 1;
    pointer-events: auto;
  }
  
  /* Hide labels on tiny screens for topbar */
  @media (max-width: 480px){
    .topbar-actions .btn-label{display:none}
    .topbar-actions .btn{ padding: 8px; }
    header.topbar{ gap: 4px; }
  }
}

/* Hide mobile FAB bar on desktop */
.mobile-fab-bar{ display: none; }
.mobile-backdrop{ display: none; }
@media (max-width: 900px){
  .mobile-fab-bar{ display: flex; }
  .mobile-backdrop{ display: block; }
}

::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg-app)}
::-webkit-scrollbar-thumb{background:var(--bg-card);border-radius:5px;border:2px solid var(--bg-app)}
::-webkit-scrollbar-thumb:hover{background:var(--gold-deep)}

/* ═══════════ PRINT STYLES (for browser print → PDF fallback) ═══════════ */
@media print{
  body{background:#fff !important;overflow:visible !important}
  .app{display:none !important}
  .print-only{display:block !important}
}
/* ════════ LOGIN SCREEN ════════ */
.print-only{display:none}
#login-overlay{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(circle at 50% 50%, #2d1d13 0%, #1a1209 70%, #0a0604 100%);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
#login-overlay.hidden{display:none}
.login-card{
  width:100%;max-width:420px;
  background:linear-gradient(160deg, #241710, #1a1209);
  border:1px solid var(--border-strong);
  border-radius:12px;
  padding:36px 32px;
  box-shadow:0 20px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(201,169,110,.15);
  position:relative;overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;inset:-50%;
  background:radial-gradient(circle, rgba(201,169,110,.05) 0%, transparent 60%);
  pointer-events:none;
}
.login-logo{
  display:flex;justify-content:center;margin-bottom:18px;position:relative;z-index:2;
}
.login-logo svg{width:64px;height:64px;color:var(--gold-light)}
.login-brand{
  font-family:var(--font-en-display);
  font-size:26px;text-align:center;color:var(--text);
  margin-bottom:4px;position:relative;z-index:2;
}
.login-brand em{font-style:italic;color:var(--gold-light);font-weight:300}
.login-tagline{
  text-align:center;font-family:var(--font-en-display);font-style:italic;
  font-size:9px;letter-spacing:4px;color:var(--gold-light);
  text-transform:uppercase;margin-bottom:24px;position:relative;z-index:2;
}
.login-divider{
  height:1px;background:linear-gradient(90deg,transparent,var(--gold-light),transparent);
  margin-bottom:22px;opacity:.6;position:relative;z-index:2;
}
.login-form{position:relative;z-index:2;display:flex;flex-direction:column;gap:14px}
.login-form label{
  display:block;font-size:11px;color:var(--text-soft);
  margin-bottom:6px;font-weight:600;letter-spacing:0.3px;
}
.login-form input{
  width:100%;padding:11px 14px;
  background:rgba(10,6,4,0.5);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-family:var(--font-ar-body);
  font-size:14px;
  outline:none;
  transition:border-color .2s, background .2s;
}
.login-form input:focus{
  border-color:var(--gold-light);
  background:rgba(10,6,4,0.7);
}
.login-form input::placeholder{color:var(--text-soft);opacity:.5}
.login-btn{
  width:100%;padding:13px;
  background:linear-gradient(135deg, var(--gold-light), var(--gold));
  border:none;border-radius:8px;
  color:#1a1209;
  font-family:var(--font-ar-body);
  font-size:14px;font-weight:700;
  cursor:pointer;
  transition:transform .15s, box-shadow .15s, opacity .2s;
  letter-spacing:0.3px;
  margin-top:6px;
}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,169,110,.3)}
.login-btn:active{transform:translateY(0)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-error{
  background:rgba(176,74,26,0.15);
  border:1px solid rgba(176,74,26,0.4);
  color:#e89a6a;
  padding:10px 12px;border-radius:8px;
  font-size:12px;text-align:center;
  display:none;
}
.login-error.show{display:block}
.login-hint{
  margin-top:18px;font-size:10px;color:var(--text-soft);
  text-align:center;line-height:1.6;position:relative;z-index:2;
  opacity:.7;
}
.login-hint code{
  background:rgba(201,169,110,.08);
  padding:2px 6px;border-radius:3px;
  font-family:'Courier New',monospace;color:var(--gold-light);
  font-size:11px;
}

/* User badge in topbar */
.user-badge{
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;background:rgba(201,169,110,.08);
  border:1px solid var(--border);border-radius:20px;
  font-size:12px;color:var(--gold-light);
  margin-right:8px;
}
.user-badge svg{width:14px;height:14px}
.user-badge-name{font-weight:600;color:var(--text)}
.btn-logout{
  background:transparent;border:none;color:var(--text-soft);
  cursor:pointer;padding:4px 8px;font-size:11px;
  border-radius:4px;font-family:var(--font-ar-body);
}
.btn-logout:hover{color:var(--burnt);background:rgba(176,74,26,.1)}

@media (max-width:600px){
  .login-card{padding:28px 22px}
  .login-brand{font-size:22px}
  .login-logo svg{width:54px;height:54px}
}

</style>

<script id="app-script">
// ═══════════════════════════════════════════════════════════════
// BE FIRST LADY — PRINT STUDIO
// 19 print templates: office (3) + cards (5) + merch (2) + HR (11)
// + digital seal/stamp + multi-export + drag/edit + login system
// ═══════════════════════════════════════════════════════════════

// ════════ AUTHENTICATION SYSTEM ════════
const AUTH_USERS = {
  'Raghad': { password: 'Raghad@2026', name: 'رغد', role: 'admin', label: 'المالكة' },
  'HR': { password: 'HR@2026', name: 'HR', role: 'hr', label: 'موظفة الموارد البشرية' },
};
const AUTH_KEY = 'bfl_auth_v1';

function getCurrentUser() {
  try {
    const data = sessionStorage.getItem(AUTH_KEY);
    if (!data) return null;
    const parsed = JSON.parse(data);
    if (parsed && AUTH_USERS[parsed.user]) return { user: parsed.user, ...AUTH_USERS[parsed.user] };
  } catch (e) {}
  return null;
}

function authenticate(username, password) {
  const user = AUTH_USERS[username];
  if (user && user.password === password) {
    sessionStorage.setItem(AUTH_KEY, JSON.stringify({ user: username, ts: Date.now() }));
    return { user: username, ...user };
  }
  return null;
}

function logout() {
  sessionStorage.removeItem(AUTH_KEY);
  location.reload();
}

function showLoginOverlay() {
  const overlay = document.getElementById('login-overlay');
  if (overlay) overlay.classList.remove('hidden');
}

function hideLoginOverlay() {
  const overlay = document.getElementById('login-overlay');
  if (overlay) overlay.classList.add('hidden');
}

function updateUserBadge(user) {
  const badge = document.getElementById('user-badge');
  const name = document.getElementById('user-badge-name');
  if (badge && name) {
    badge.style.display = 'flex';
    name.textContent = user.name + (user.role === 'admin' ? ' 👑' : '');
    name.title = user.label;
  }
}

function setupLoginForm() {
  const form = document.getElementById('login-form');
  const errBox = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  const userIn = document.getElementById('login-user');
  const passIn = document.getElementById('login-pass');
  
  if (!form) return;
  
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    errBox.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'جاري التحقق...';
    
    setTimeout(() => {
      const u = userIn.value.trim();
      const p = passIn.value;
      const result = authenticate(u, p);
      
      if (result) {
        updateUserBadge(result);
        hideLoginOverlay();
        // Boot the app
        if (typeof initApp === 'function') initApp();
      } else {
        errBox.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'تسجيل الدخول';
        passIn.value = '';
        passIn.focus();
      }
    }, 400); // small delay for UX
  });
  
  // Allow Enter in any input to submit
  [userIn, passIn].forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        form.dispatchEvent(new Event('submit'));
      }
    });
  });
  
  // Logout button
  const logoutBtn = document.getElementById('btn-logout');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', () => {
      if (confirm('هل تريدين تسجيل الخروج؟')) logout();
    });
  }
  
  // Focus first input
  setTimeout(() => userIn && userIn.focus(), 100);
}

const BRAND = {
  cream50: '#fbf7ef', cream100: '#f6eee0', cream200: '#ece1cc',
  cream300: '#dfd0b5', cream400: '#c9b690',
  gold: '#7d613b', goldLight: '#c9a96e', goldDeep: '#5a4628',
  burnt: '#b04a1a', ink: '#2a1c10', inkSoft: '#6b5a42',
  palette: ['#fbf7ef','#f6eee0','#ece1cc','#dfd0b5','#c9b690','#c9a96e','#7d613b','#5a4628','#b04a1a','#2a1c10','#ffffff','#000000'],
};

// ════════ PERFORMANCE HELPERS ════════
let _renderDocRAF = null;
function rafRenderDoc() {
  // requestAnimationFrame batching — for slider/range inputs that fire rapidly
  if (_renderDocRAF) cancelAnimationFrame(_renderDocRAF);
  _renderDocRAF = requestAnimationFrame(() => {
    _renderDocRAF = null;
    if (typeof renderDoc === 'function') renderDoc();
  });
}

function debounce(fn, ms = 150) {
  let t = null;
  return function(...args) {
    if (t) clearTimeout(t);
    t = setTimeout(() => { t = null; fn.apply(this, args); }, ms);
  };
}

// Each template:
//   { id, name, icon, sizeMm:[w,h], category, build:(content)=>htmlString, defaultContent:{} }

// ════════ SOCIAL MEDIA ICONS LIBRARY ════════

// Inject social icons as <symbol> into the SVG sprite at runtime
function injectSocialIcons() {
  const sprite = document.getElementById('svg-sprite');
  if (!sprite) return;
  // Check if already injected
  if (document.getElementById('ic-instagram')) return;
  
  Object.entries(SOCIAL_ICONS).forEach(([key, svgStr]) => {
    // Wrap SVG content in a <symbol> for reuse
    // Extract the inner content (paths) from the svg
    const match = svgStr.match(/<svg[^>]*viewBox="([^"]*)"[^>]*>([\s\S]*)<\/svg>/);
    if (!match) return;
    const viewBox = match[1];
    const inner = match[2];
    // Add fill="currentColor" to <symbol> so that all child paths inherit color via `currentColor`
    // (the original SVG had fill="currentColor" on the <svg> root — we preserve that semantic on <symbol>)
    const symbol = `<symbol id="ic-${key}" viewBox="${viewBox}" fill="currentColor">${inner}</symbol>`;
    sprite.insertAdjacentHTML('beforeend', symbol);
  });
}

// Build the social bar HTML — used in card templates
function buildSocialBar(c, s, options = {}) {
  // Per-platform colors (each platform can have its own color)
  // Priority: state override > options.brandColors[platform] > options.color (uniform) > brand default
  const fallbackIcon = (s && s.socialIconColor) || options.color || '#7d613b';
  const fallbackText = (s && s.socialTextColor) || options.textColor || fallbackIcon;
  
  // Brand colors for each platform (used as defaults when no custom color set)
  const brandColors = options.brandColors || {};
  
  const getColor = (platform, type = 'icon') => {
    // Per-platform override (e.g., state.styleOverrides.socialColors.instagram)
    const overrides = (s && s.socialColors) || {};
    if (overrides[platform]) return overrides[platform];
    // Brand colors per platform (template-specific)
    if (brandColors[platform]) return brandColors[platform];
    // Fallback to uniform color
    return type === 'icon' ? fallbackIcon : fallbackText;
  };
  
  const showOnly = options.showOnly;
  const size = options.size || 'medium';
  const layout = options.layout || 'row';
  const iconsOnly = options.iconsOnly === true;
  const iconSize = size === 'small' ? '3.5mm' : size === 'large' ? '5mm' : '4mm';
  const fontSize = size === 'small' ? '6pt' : size === 'large' ? '8pt' : '7pt';
  const gap = size === 'small' ? '3mm' : size === 'large' ? '5mm' : '4mm';
  
  const platforms = [
    { key: 'instagram', icon: 'ic-instagram', handle: c.socialInsta || '@befirstlady' },
    { key: 'tiktok', icon: 'ic-tiktok', handle: c.socialTiktok || '@befirstlady' },
    { key: 'snapchat', icon: 'ic-snapchat', handle: c.socialSnap || 'befirstlady' },
    { key: 'whatsapp', icon: 'ic-whatsapp', handle: c.socialWA || c.phone || '+966 50 438 9329' },
  ];
  
  const platformsToShow = showOnly ? platforms.filter(p => showOnly.includes(p.key)) : platforms;
  
  const items = platformsToShow.map(p => {
    const iconColor = getColor(p.key, 'icon');
    const textColor = (s && s.socialTextColor) || iconColor; // text follows uniform text color or icon
    return `
    <div style="display:inline-flex;align-items:center;gap:1mm;white-space:nowrap">
      <svg viewBox="0 0 24 24" fill="currentColor" style="width:${iconSize};height:${iconSize};color:${iconColor};flex-shrink:0"><use href="#${p.icon}"/></svg>
      ${iconsOnly ? '' : `<span data-field="social_${p.key}" style="font-family:'Cormorant Garamond',serif;font-size:${fontSize};color:${textColor};letter-spacing:0.5pt" dir="ltr">${p.handle}</span>`}
    </div>
  `;
  }).join('');
  
  // Grid layout: 2x2 stacked
  if (layout === 'grid') {
    return `<div data-field="socialBar" style="display:grid;grid-template-columns:auto auto;column-gap:${gap};row-gap:1.5mm;justify-content:center;align-items:center;padding:2mm 4mm;width:fit-content;margin:0 auto;cursor:move">${items}</div>`;
  }
  // Default row layout
  return `<div data-field="socialBar" style="display:flex;justify-content:center;align-items:center;gap:${gap};flex-wrap:wrap;padding:2mm 4mm;cursor:move">${items}</div>`;
}

// Helper: get pattern overlay HTML for a card template
function bgPatternOverlay(s, key, color) {
  const patternId = (s && s[key + 'BgPattern']) || 'none';
  if (!patternId || patternId === 'none') return '';
  const pattern = BG_PATTERNS.find(p => p.id === patternId);
  if (!pattern || !pattern.defs) return '';
  const opacity = (s && s[key + 'BgOpacity'] != null) ? s[key + 'BgOpacity'] : 0.15;
  const uniqId = `${key}-${patternId}-${Math.floor(Math.random() * 10000)}`;
  const defs = pattern.defs(color || '#c9a96e', opacity).replace(/\{ID\}/g, uniqId);
  return `<div style="position:absolute;inset:0;pointer-events:none;overflow:hidden">
    <svg style="position:absolute;inset:0;width:100%;height:100%;display:block" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>${defs}</defs>
      <rect width="100%" height="100%" fill="url(#P-${uniqId})"/>
    </svg>
  </div>`;
}

// Helper to get current card theme
function getCardTheme(s, key, defaultIdx = 0) {
  const overrideId = (s && s[key + 'ThemeId']);
  const override = (s && s[key + 'Theme']);
  if (override) return override;
  if (overrideId) {
    const found = CARD_THEMES.find(t => t.id === overrideId);
    if (found) return found;
  }
  return null; // null means use template's hardcoded defaults
}

// ═══════════ HELPERS ═══════════
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }
function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'style') Object.assign(e.style, v);
    else if (k.startsWith('on')) e[k.toLowerCase()] = v;
    else if (k === 'html') e.innerHTML = v;
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}
function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2400);
}
function mmToPx(mm) { return mm * 3.7795; } // 96dpi
function arabicDigits(num) {
  return String(num).replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[+d]);
}

// ═══════════ SIDEBAR — TEMPLATE PICKER ═══════════
function renderSidebar() {
  const sidebar = $('#sidebar');
  sidebar.innerHTML = '';
  
  const categories = {
    office: 'مكتبية',
    cards: 'كروت',
    hr: 'موارد بشرية',
    merch: 'تغليف ومنتجات',
  };
  
  Object.entries(categories).forEach(([catKey, catName]) => {
    const section = el('div', { class: 'sidebar-section' });
    section.appendChild(el('div', { class: 'sidebar-title' }, catName));
    
    Object.values(TEMPLATES).filter(t => t.category === catKey).forEach(tpl => {
      const tile = el('div', {
        class: 'template-tile' + (state.currentTemplate === tpl.id ? ' active' : ''),
        onclick: () => loadTemplate(tpl.id),
      },
        el('div', { class: 'template-tile-icon', html: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${tpl.icon}</svg>` }),
        el('div', { class: 'template-tile-meta' },
          el('div', { class: 'template-tile-name' }, tpl.name),
          el('div', { class: 'template-tile-size' }, `${tpl.sizeMm[0]}×${tpl.sizeMm[1]}mm`)
        )
      );
      section.appendChild(tile);
    });
    sidebar.appendChild(section);
  });
}

// ═══════════ TEMPLATE LOADING ═══════════
function loadTemplate(id) {
  const tpl = TEMPLATES[id];
  if (!tpl) return;
  state.currentTemplate = id;
  state.content = JSON.parse(JSON.stringify(tpl.defaultContent));
  state.stamp.visible = false;
  renderDoc();
  renderSidebar();
  renderPanel();
  fitZoom();
  toast(`تم تحميل ${tpl.name}`);
}

// ═══════════ DOC RENDERING ═══════════
function renderDoc() {
  const stage = $('#doc-stage');
  if (!state.currentTemplate) {
    stage.innerHTML = '<div id="doc-page" class="doc-page" style="width:210mm;height:297mm"><div style="padding:100px;text-align:center;color:var(--ink-soft);font-size:18px">اختاري نوع المطبوعة لبدء التحرير</div></div>';
    return;
  }
  
  const tpl = TEMPLATES[state.currentTemplate];
  let content = TEMPLATE_BUILDERS[state.currentTemplate](state.content, state.styleOverrides);
  
  // Normalize to array of pages
  const pages = Array.isArray(content) ? content : [content];
  
  // Build the stage with one or more .doc-page divs
  stage.innerHTML = '';
  pages.forEach((pageHtml, i) => {
    const pageDiv = document.createElement('div');
    pageDiv.className = 'doc-page';
    if (i === 0) pageDiv.id = 'doc-page'; // first page keeps the canonical id (export uses it)
    pageDiv.dataset.pageIndex = i;
    pageDiv.style.width = tpl.sizeMm[0] + 'mm';
    pageDiv.style.height = tpl.sizeMm[1] + 'mm';
    if (i > 0) pageDiv.style.marginTop = '24px'; // visual gap between pages in viewer
    pageDiv.innerHTML = pageHtml;
    stage.appendChild(pageDiv);
  });
  
  // Update title (show page count when multi-page)
  const pageCountLabel = pages.length > 1 ? ` · ${pages.length} صفحات` : '';
  $('#doc-title-display').textContent = `${tpl.name} · ${tpl.sizeMm[0]}×${tpl.sizeMm[1]}mm${pageCountLabel}`;
  
  // Render stamp if visible (on first page only)
  if (state.stamp.visible) {
    renderStamp();
  }
  
  // Container fields (draggable but not text-editable — they hold child elements)
  const CONTAINER_FIELDS = new Set(['qrBox', 'logoIcon', 'socialBar']);
  
  // Bind editable fields + apply font overrides across ALL pages
  stage.querySelectorAll('[data-field]').forEach(el => {
    const key = el.dataset.field;
    const isContainer = CONTAINER_FIELDS.has(key);
    el.contentEditable = isContainer ? 'false' : 'true';
    el.classList.add('doc-field');
    if (isContainer) el.classList.add('doc-field-container');
    
    // Apply font overrides
    const override = state.fontOverrides[key];
    if (override) {
      if (override.size) el.style.fontSize = override.size + 'pt';
      if (override.family) el.style.fontFamily = override.family;
      if (override.color) el.style.color = override.color;
      if (override.weight) el.style.fontWeight = override.weight;
      if (override.style) el.style.fontStyle = override.style;
      if (override.letterSpacing != null) el.style.letterSpacing = override.letterSpacing + 'pt';
    }
    
    // Highlight if this is the selected field
    if (state.selectedField === key) {
      el.classList.add('field-selected');
    }
    
    el.addEventListener('input', e => {
      const fkey = e.target.dataset.field;
      // Special handling for contract custom articles: customArt{idx}_{prop}
      const customMatch = /^customArt(\d+)_(title|body)$/.exec(fkey);
      if (customMatch) {
        const cidx = +customMatch[1];
        const prop = customMatch[2];
        if (!state.content.customArticles) state.content.customArticles = [];
        if (!state.content.customArticles[cidx]) state.content.customArticles[cidx] = { title: '', body: '' };
        state.content.customArticles[cidx][prop] = e.target.innerText;
        // Note: we don't re-render to avoid losing focus while typing
      } else {
        state.content[fkey] = e.target.innerText;
      }
    });
    
    el.addEventListener('focus', () => {
      // Respect the suppress-focus guard set by click-outside handler
      if (state._suppressFocus && Date.now() - state._suppressFocus < 200) {
        // User just clicked outside — don't re-select
        el.blur();
        return;
      }
      state.selectedField = key;
      if (state.activePanel === 'style') {
        renderPanel();
      }
      stage.querySelectorAll('.doc-field').forEach(f => f.classList.remove('field-selected'));
      el.classList.add('field-selected');
      // Show mobile resize toolbar
      showMobileFieldResizer();
    });
    
    // Container fields need a click handler since they aren't focusable (contenteditable=false)
    if (isContainer) {
      el.addEventListener('click', (ev) => {
        // Skip if this is a suppressed click after drag
        ev.stopPropagation();
        state.selectedField = key;
        stage.querySelectorAll('.doc-field').forEach(f => f.classList.remove('field-selected'));
        el.classList.add('field-selected');
        showMobileFieldResizer();
      });
    }
    
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        if (!el.classList.contains('allow-newlines')) {
          e.preventDefault();
        }
      }
    });
    
    // Helper: read offset for a key, supporting both old number format and new {x,y} format
    const getOffset = (k) => {
      if (!state.elementOffsets) return { x: 0, y: 0 };
      const o = state.elementOffsets[k];
      if (o == null) return { x: 0, y: 0 };
      if (typeof o === 'number') return { x: 0, y: o }; // legacy
      return { x: o.x || 0, y: o.y || 0 };
    };
    
    // Apply saved position offset + scale (combined transform)
    const savedOff = getOffset(key);
    const savedScale = state.elementScale && state.elementScale[key];
    const transformParts = [];
    if (savedOff.x !== 0 || savedOff.y !== 0) {
      transformParts.push(`translate(${savedOff.x}mm, ${savedOff.y}mm)`);
    }
    if (savedScale && savedScale !== 1) {
      transformParts.push(`scale(${savedScale})`);
    }
    if (transformParts.length) {
      el.style.transform = transformParts.join(' ');
      el.style.transformOrigin = 'center center';
    }
    
    // Apply saved z-index (layer order)
    const savedZ = state.elementOffsets && state.elementOffsets[key] && state.elementOffsets[key].z;
    if (savedZ != null) {
      el.style.position = 'relative';
      el.style.zIndex = String(savedZ);
    }
    
    // Click-and-drag to move (immediate, no long-press required)
    let pressState = null;
    
    const xy = (e) => {
      if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    };
    
    const onPointerDown = (ev) => {
      // For non-container fields: skip drag if user clicks on inline link (allow link click)
      if (!isContainer && ev.target !== el && ev.target.tagName === 'A') return;
      
      const pos = xy(ev);
      if (!state.elementOffsets) state.elementOffsets = {};
      const start = getOffset(key);
      pressState = {
        startX: pos.x,
        startY: pos.y,
        startOffsetX: start.x,
        startOffsetY: start.y,
        isDragging: false,
      };
      if (isContainer) ev.preventDefault();
    };
    
    const onPointerMove = (ev) => {
      if (!pressState) return;
      const pos = xy(ev);
      const dx = pos.x - pressState.startX;
      const dy = pos.y - pressState.startY;
      const moved = Math.abs(dx) + Math.abs(dy);
      
      if (!pressState.isDragging) {
        if (moved < 6) return;
        pressState.isDragging = true;
        el.contentEditable = 'false';
        el.style.cursor = 'grabbing';
        el.classList.add('field-dragging');
        try { window.getSelection().removeAllRanges(); } catch (e) {}
        if (navigator.vibrate) navigator.vibrate(20);
      }
      
      if (ev.cancelable) ev.preventDefault();
      const zoom = state.zoom || 1;
      // Convert px → mm, accounting for zoom
      const dxMm = (dx / 3.78) / zoom;
      const dyMm = (dy / 3.78) / zoom;
      const newX = pressState.startOffsetX + dxMm;
      const newY = pressState.startOffsetY + dyMm;
      state.elementOffsets[key] = { x: newX, y: newY };
      stage.querySelectorAll(`[data-field="${key}"]`).forEach(elInst => {
        elInst.style.transform = `translate(${newX}mm, ${newY}mm)`;
      });
    };
    
    const onPointerUp = () => {
      if (pressState && pressState.isDragging) {
        el.style.cursor = '';
        el.classList.remove('field-dragging');
        // Only restore contenteditable for non-container fields
        if (!isContainer) el.contentEditable = 'true';
        // Suppress the click event from firing as edit-mode entry
        const suppressClick = (e) => { 
          e.stopPropagation(); 
          e.preventDefault(); 
          el.removeEventListener('click', suppressClick, true); 
        };
        el.addEventListener('click', suppressClick, true);
      }
      pressState = null;
    };
    
    el.addEventListener('mousedown', onPointerDown);
    el.addEventListener('touchstart', onPointerDown, { passive: true });
    document.addEventListener('mousemove', onPointerMove);
    document.addEventListener('touchmove', onPointerMove, { passive: false });
    document.addEventListener('mouseup', onPointerUp);
    document.addEventListener('touchend', onPointerUp);
  });
  
  // Apply logo overrides to all logo SVGs across all pages
  applyLogoOverrides();
  
  // Build any QR codes (for Google review template, etc.)
  buildQRCodes();
}

function buildQRCodes() {
  if (typeof qrcode === 'undefined') return; // library not loaded
  const stage = $('#doc-stage');
  if (!stage) return;
  
  stage.querySelectorAll('[data-qr-target]').forEach(container => {
    const url = container.dataset.qrTarget;
    if (!url) return;
    
    // If logo will be overlaid, use highest error correction (H = 30%)
    const withLogo = container.dataset.qrWithLogo === '1';
    const errorLevel = withLogo ? 'H' : 'M';
    
    try {
      // Generate QR code: type 0 = auto-detect best version
      const qr = qrcode(0, errorLevel);
      qr.addData(url);
      qr.make();
      
      const moduleCount = qr.getModuleCount();
      const size = 100; // viewBox units
      const cellSize = size / moduleCount;
      // Read colors from state overrides or use brand defaults
      const qrColors = state.styleOverrides.qrColors || {};
      const darkColor = qrColors.dark || '#2a1c10';    // brand ink (deep brown)
      const bgColor = qrColors.bg || '#fbf7ef';        // brand cream
      const finderColor = qrColors.finder || qrColors.dark || '#5a4628'; // deeper brown for finder patterns
      
      let svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}" style="width:100%;height:100%;display:block">`;
      svgContent += `<rect width="${size}" height="${size}" fill="${bgColor}"/>`;
      
      // Identify finder pattern positions (3 corners: top-left, top-right, bottom-left)
      // Finder patterns are 7×7 modules at:
      //   (0,0), (0, moduleCount-7), (moduleCount-7, 0)
      const isInFinderPattern = (r, c) => {
        const inTL = r < 7 && c < 7;
        const inTR = r < 7 && c >= moduleCount - 7;
        const inBL = r >= moduleCount - 7 && c < 7;
        return inTL || inTR || inBL;
      };
      
      // Render dark modules — body uses ink color, finder patterns use deeper brown for branded look
      for (let r = 0; r < moduleCount; r++) {
        for (let c = 0; c < moduleCount; c++) {
          if (qr.isDark(r, c)) {
            const color = isInFinderPattern(r, c) ? finderColor : darkColor;
            // Slightly rounded module corners for softer aesthetic
            const rx = withLogo ? 0.15 : 0;
            svgContent += `<rect x="${c * cellSize}" y="${r * cellSize}" width="${cellSize}" height="${cellSize}" fill="${color}" rx="${rx}"/>`;
          }
        }
      }
      
      svgContent += '</svg>';
      container.innerHTML = svgContent;
    } catch (e) {
      console.warn('QR generation failed for URL:', url, e);
      container.innerHTML = `<div style="font-size:8px;color:#b04a1a;text-align:center;padding:6mm">QR generation failed</div>`;
    }
  });
}

function applyLogoOverrides() {
  const stage = $('#doc-stage');
  if (!stage) return;
  const lo = state.logoOverrides;
  // Find all SVGs that contain a <use> to a brand-logo variant (across all pages)
  stage.querySelectorAll('svg').forEach(svg => {
    const use = svg.querySelector('use');
    if (!use) return;
    const href = use.getAttribute('href') || use.getAttribute('xlink:href') || '';
    if (!href.startsWith('#brand-logo')) return;
    if (svg.closest('.stamp-overlay')) return;
    
    // Mark as customizable
    svg.classList.add('brand-logo-target');
    
    // Apply variant change
    if (lo.variant) {
      use.setAttribute('href', '#' + lo.variant);
    }
    
    // Apply color via currentColor
    if (lo.color) {
      svg.style.color = lo.color;
    }
    
    // Apply size multiplier
    if (lo.size && lo.size !== 1) {
      // Preserve original size by reading from computed style if not yet stored
      if (!svg.dataset.origWidth) {
        const cs = window.getComputedStyle(svg);
        svg.dataset.origWidth = cs.width;
        svg.dataset.origHeight = cs.height;
      }
      // Apply transform-based scaling — preserves layout flow
      svg.style.transformOrigin = 'center';
      svg.style.transform = `scale(${lo.size})`;
    } else {
      svg.style.transform = '';
    }
    
    // Apply opacity
    if (lo.opacity != null && lo.opacity !== 1) {
      svg.style.opacity = lo.opacity;
    } else {
      svg.style.opacity = '';
    }
  });
}

function renderStamp() {
  const page = $('#doc-page');
  let existing = page.querySelector('.stamp-overlay');
  if (existing) existing.remove();
  
  const s = state.stamp;
  const stampColors = {
    cream: { bg: '#fbf7ef', fg: '#7d613b', stroke: '#7d613b' },
    ink: { bg: 'transparent', fg: '#c9a96e', stroke: '#c9a96e' },
    burnt: { bg: 'transparent', fg: '#b04a1a', stroke: '#b04a1a' },
  };
  const c = stampColors[s.style];
  
  const stamp = el('div', {
    class: 'stamp-overlay' + (state.selectedStamp ? ' selected' : ''),
    style: {
      left: s.x + 'px',
      top: s.y + 'px',
      width: s.size + 'px',
      height: s.size + 'px',
      transform: `rotate(${s.rotation}deg)`,
    }
  });
  
  stamp.innerHTML = `
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="stamp-top-${Date.now()}" d="M 100,100 m -82,0 a 82,82 0 1,1 164,0"/>
        <path id="stamp-bot-${Date.now()}" d="M 100,100 m -68,0 a 68,68 0 1,0 136,0"/>
      </defs>
      <circle cx="100" cy="100" r="92" fill="${c.bg}" stroke="${c.stroke}" stroke-width="2"/>
      <circle cx="100" cy="100" r="86" fill="none" stroke="${c.stroke}" stroke-width="0.7" opacity="0.6"/>
      <circle cx="100" cy="100" r="62" fill="none" stroke="${c.stroke}" stroke-width="0.5" opacity="0.5"/>
      
      <text font-family="'Cormorant Garamond', serif" font-size="9" font-style="italic" fill="${c.fg}" letter-spacing="3.5">
        <textPath href="#stamp-top-${Date.now()}" startOffset="50%" text-anchor="middle">${s.text1}</textPath>
      </text>
      <text font-family="'Cormorant Garamond', serif" font-size="7.5" font-style="italic" fill="${c.fg}" letter-spacing="4" opacity="0.78">
        <textPath href="#stamp-bot-${Date.now()}" startOffset="50%" text-anchor="middle">EST · ${s.text2} · EST</textPath>
      </text>
      
      <g fill="${c.fg}" opacity="0.7" font-family="serif" font-size="10" text-anchor="middle">
        <text x="14" y="104">✦</text>
        <text x="186" y="104">✦</text>
      </g>
      
      ${s.showLogo ? `<g transform="translate(50, 50)">
        <svg width="100" height="100" viewBox="0 0 194.88 195" style="color:${c.fg}"><use href="#brand-logo-outline"/></svg>
      </g>` : ''}
    </svg>
  `;
  
  // Drag handler
  stamp.addEventListener('mousedown', e => {
    if (e.target.classList.contains('stamp-handle')) return;
    e.stopPropagation();
    const startX = e.clientX, startY = e.clientY;
    const origX = s.x, origY = s.y;
    stamp.classList.add('dragging');
    const onMove = ev => {
      s.x = origX + (ev.clientX - startX) / state.zoom;
      s.y = origY + (ev.clientY - startY) / state.zoom;
      stamp.style.left = s.x + 'px';
      stamp.style.top = s.y + 'px';
    };
    const onUp = () => {
      stamp.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  
  page.appendChild(stamp);
}

// ═══════════ PANEL ═══════════
function renderPanel() {
  const content = $('#panel-content');
  content.innerHTML = '';
  
  if (!state.currentTemplate) {
    content.innerHTML = '<div style="text-align:center;padding:30px 10px;color:var(--text-soft);font-size:12px">اختاري نوع المطبوعة لعرض خيارات التحرير</div>';
    return;
  }
  
  const tpl = TEMPLATES[state.currentTemplate];
  
  if (state.activePanel === 'content') {
    renderContentPanel(content, tpl);
  } else if (state.activePanel === 'style') {
    renderStylePanel(content);
  } else if (state.activePanel === 'stamp') {
    renderStampPanel(content);
  }
}

// ═══════════ BLOCK REORDER DRAG-AND-DROP (mouse + touch unified) ═══════════
function setupBlockDragAndDrop(listEl) {
  if (!listEl) return;
  const items = Array.from(listEl.querySelectorAll('.block-reorder-item'));
  
  // Unified pointer coordinate extractor
  const xy = (e) => {
    if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  };
  
  items.forEach((item) => {
    let dragState = null;
    
    const onPointerDown = (e) => {
      // Ignore drags that start from buttons (let the click work normally)
      if (e.target.closest('button')) return;
      
      e.preventDefault();
      const startXY = xy(e);
      const rect = item.getBoundingClientRect();
      const listRect = listEl.getBoundingClientRect();
      
      // Create the ghost (visual representation of the item being dragged)
      const ghost = item.cloneNode(true);
      ghost.style.position = 'fixed';
      ghost.style.left = rect.left + 'px';
      ghost.style.top = rect.top + 'px';
      ghost.style.width = rect.width + 'px';
      ghost.style.zIndex = '500';
      ghost.style.opacity = '0.9';
      ghost.style.pointerEvents = 'none';
      ghost.style.boxShadow = '0 8px 24px rgba(0,0,0,.5)';
      ghost.style.transform = 'rotate(-1deg) scale(1.02)';
      ghost.style.background = 'var(--gold)';
      ghost.style.color = '#fff';
      document.body.appendChild(ghost);
      
      // Make the original item appear as a placeholder
      item.style.opacity = '0.3';
      item.style.background = 'rgba(201,169,110,0.15)';
      
      dragState = {
        startX: startXY.x,
        startY: startXY.y,
        ghost,
        rect,
        listRect,
        currentIdx: parseInt(item.dataset.blockIdx),
        startIdx: parseInt(item.dataset.blockIdx),
      };
      
      document.addEventListener('mousemove', onPointerMove);
      document.addEventListener('mouseup', onPointerUp);
      document.addEventListener('touchmove', onPointerMove, { passive: false });
      document.addEventListener('touchend', onPointerUp);
      document.addEventListener('touchcancel', onPointerUp);
    };
    
    const onPointerMove = (e) => {
      if (!dragState) return;
      if (e.cancelable) e.preventDefault();
      const cur = xy(e);
      const dx = cur.x - dragState.startX;
      const dy = cur.y - dragState.startY;
      
      // Move the ghost
      dragState.ghost.style.left = (dragState.rect.left + dx) + 'px';
      dragState.ghost.style.top = (dragState.rect.top + dy) + 'px';
      
      // Determine which item we're hovering over
      const ghostRect = dragState.ghost.getBoundingClientRect();
      const ghostCenterY = ghostRect.top + ghostRect.height / 2;
      
      // Check each sibling for being the new drop target
      const siblings = Array.from(listEl.querySelectorAll('.block-reorder-item'));
      let newIdx = dragState.currentIdx;
      
      siblings.forEach((sib, i) => {
        if (sib === item) return; // skip self
        const sibRect = sib.getBoundingClientRect();
        const sibMid = sibRect.top + sibRect.height / 2;
        // Visual indicator: move siblings out of the way
        if (ghostCenterY < sibMid && i < dragState.currentIdx) {
          newIdx = i;
        } else if (ghostCenterY > sibMid && i > dragState.currentIdx) {
          newIdx = i;
        }
      });
      
      // Update visual hover indicator
      siblings.forEach((sib) => {
        sib.style.transform = '';
      });
      
      if (newIdx !== dragState.currentIdx) {
        // Reorder in DOM for visual preview
        const order = state.styleOverrides.blockOrder;
        const [moved] = order.splice(dragState.currentIdx, 1);
        order.splice(newIdx, 0, moved);
        dragState.currentIdx = newIdx;
        
        // Re-render visual order by moving DOM nodes
        // (we don't call renderPanel yet to keep drag smooth)
        const reorderedDoms = order.map(key => 
          siblings.find(s => s.dataset.blockKey === key) || item
        );
        reorderedDoms.forEach((domEl) => {
          listEl.appendChild(domEl);
        });
        // Update data-block-idx + number display for all items
        Array.from(listEl.querySelectorAll('.block-reorder-item')).forEach((it, i) => {
          it.dataset.blockIdx = i;
          const num = it.querySelector('.block-reorder-num');
          if (num) num.textContent = String(i + 1);
        });
        
        // Live render the document with new order
        renderDoc();
      }
    };
    
    const onPointerUp = () => {
      if (!dragState) return;
      // Restore the original item
      item.style.opacity = '';
      item.style.background = '';
      // Remove ghost
      dragState.ghost?.remove();
      dragState = null;
      
      document.removeEventListener('mousemove', onPointerMove);
      document.removeEventListener('mouseup', onPointerUp);
      document.removeEventListener('touchmove', onPointerMove);
      document.removeEventListener('touchend', onPointerUp);
      document.removeEventListener('touchcancel', onPointerUp);
      
      // Re-render the panel to refresh button states (disabled at edges)
      renderPanel();
    };
    
    item.addEventListener('mousedown', onPointerDown);
    item.addEventListener('touchstart', onPointerDown, { passive: false });
  });
}

// ════════ SHARED CARD BACKGROUND PATTERN PICKER ════════
function buildBgPatternPicker(templateKey) {
  const patternKey = templateKey + 'BgPattern';
  const opacityKey = templateKey + 'BgOpacity';
  const currentId = state.styleOverrides[patternKey] || 'none';
  const currentOpacity = state.styleOverrides[opacityKey] != null ? state.styleOverrides[opacityKey] : 0.15;
  
  const section = el('div', { class: 'panel-section', style: { marginTop: '12px' } });
  section.appendChild(el('div', { class: 'panel-section-title' }, 'خلفية البطاقة'));
  section.appendChild(el('div', { 
    style: { fontSize: '10px', color: 'var(--text-soft)', marginBottom: '10px', lineHeight: '1.6' } 
  }, '🎨 أضيفي نمطاً زخرفياً فوق لون الخلفية'));
  
  // Category labels
  const catLabels = { none: '', geometric: 'هندسية', marble: 'رخامية', gold: 'ذهبية', fabric: 'نسيج' };
  
  // Group patterns by category
  const byCat = {};
  BG_PATTERNS.forEach(p => {
    if (!byCat[p.cat]) byCat[p.cat] = [];
    byCat[p.cat].push(p);
  });
  
  ['none', 'geometric', 'marble', 'gold', 'fabric'].forEach(cat => {
    const patterns = byCat[cat] || [];
    if (patterns.length === 0) return;
    
    if (catLabels[cat]) {
      section.appendChild(el('div', {
        style: { fontSize: '10px', fontWeight: '600', color: 'var(--gold-light)', margin: '8px 0 4px', letterSpacing: '0.5px' }
      }, catLabels[cat]));
    }
    
    const grid = el('div', { 
      style: { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '4px' } 
    });
    
    patterns.forEach(p => {
      const isSelected = currentId === p.id;
      
      // Build preview SVG inline
      let previewSVG = '';
      if (p.defs) {
        const uniqId = `prev-${p.id}`;
        const defs = p.defs('#c9a96e', 0.8).replace(/\{ID\}/g, uniqId);
        previewSVG = `<svg viewBox="0 0 40 40" style="width:100%;height:100%"><defs>${defs}</defs><rect width="40" height="40" fill="url(#P-${uniqId})"/></svg>`;
      } else {
        previewSVG = `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:18px;color:var(--text-soft)">${p.icon}</div>`;
      }
      
      const btn = el('button', {
        style: {
          padding: '4px',
          background: isSelected ? '#2a1c10' : 'var(--bg-card)',
          border: isSelected ? '2px solid var(--gold-light)' : '1px solid var(--border)',
          borderRadius: '6px',
          cursor: 'pointer',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          gap: '2px',
          minHeight: '54px',
          fontFamily: 'var(--font-ar-body)',
        },
        onclick: () => {
          if (p.id === 'none') {
            delete state.styleOverrides[patternKey];
          } else {
            state.styleOverrides[patternKey] = p.id;
          }
          renderDoc();
          renderPanel();
        }
      });
      
      // Preview area
      const preview = el('div', {
        style: {
          width: '100%',
          height: '32px',
          background: '#1a1209',
          borderRadius: '3px',
          overflow: 'hidden',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
        }
      });
      preview.innerHTML = previewSVG;
      btn.appendChild(preview);
      
      btn.appendChild(el('div', {
        style: { fontSize: '8.5px', color: isSelected ? 'var(--gold-light)' : 'var(--text-soft)', textAlign: 'center', lineHeight: '1.1', fontWeight: isSelected ? '700' : '500' }
      }, p.label));
      
      grid.appendChild(btn);
    });
    
    section.appendChild(grid);
  });
  
  // Opacity slider (only show if a pattern is selected)
  if (currentId !== 'none') {
    const opacityRow = el('div', { style: { marginTop: '10px', padding: '8px', background: 'var(--bg-card)', borderRadius: '6px' } });
    const opacityLabel = el('div', {
      style: { display: 'flex', justifyContent: 'space-between', fontSize: '10px', color: 'var(--text-soft)', marginBottom: '4px' }
    });
    opacityLabel.appendChild(el('span', {}, 'كثافة النمط'));
    const opacityValue = el('span', { style: { color: 'var(--gold-light)', fontWeight: '600' } }, 
      `${Math.round(currentOpacity * 100)}%`);
    opacityLabel.appendChild(opacityValue);
    opacityRow.appendChild(opacityLabel);
    
    const opacitySlider = el('input', {
      type: 'range',
      min: '0.05',
      max: '0.5',
      step: '0.01',
      value: currentOpacity,
      style: { width: '100%', cursor: 'pointer' }
    });
    opacitySlider.addEventListener('input', (e) => {
      state.styleOverrides[opacityKey] = +e.target.value;
      opacityValue.textContent = `${Math.round(+e.target.value * 100)}%`;
      rafRenderDoc();
    });
    opacityRow.appendChild(opacitySlider);
    section.appendChild(opacityRow);
  }
  
  return section;
}

function renderContentPanel(content, tpl) {
  const section = el('div', { class: 'panel-section' });
  section.appendChild(el('div', { class: 'panel-section-title' }, 'تحرير المحتوى'));
  
  tpl.fields.forEach(field => {
    if (field.type === 'items') {
      // Special UI for invoice items
      renderItemsField(section, field);
      return;
    }
    const row = el('div', { class: 'control-row' });
    row.appendChild(el('label', { class: 'control-label' }, field.label));
    
    const input = field.type === 'textarea'
      ? el('textarea', { class: 'control-textarea', rows: 4 })
      : el('input', { class: 'control-input', type: field.type === 'number' ? 'number' : 'text' });
