    const allBlockKeys = ['logo', 'smallHeader', 'stars', 'mainTitle', 'sub', 'divider', 'description', 'qr', 'ctaText', 'linkUrl', 'bottomCta', 'thankYou', 'brand', 'socialBar'];
    if (!state.styleOverrides.blockOrder || state.styleOverrides.blockOrder.length === 0) {
      state.styleOverrides.blockOrder = [...allBlockKeys];
    } else {
      // Auto-migrate: add any missing blocks
      const missing = allBlockKeys.filter(k => !state.styleOverrides.blockOrder.includes(k));
      if (missing.length > 0) {
        // Smart insertion: ctaText/linkUrl/bottomCta go after qr if they're missing
        const qrIdx = state.styleOverrides.blockOrder.indexOf('qr');
        const subKeys = ['ctaText', 'linkUrl', 'bottomCta'];
        const missingSubs = missing.filter(k => subKeys.includes(k));
        const missingOther = missing.filter(k => !subKeys.includes(k));
        
        if (qrIdx >= 0 && missingSubs.length > 0) {
          // Insert subs after qr in canonical order
          const orderedSubs = subKeys.filter(k => missingSubs.includes(k));
          state.styleOverrides.blockOrder = [
            ...missingOther,
            ...state.styleOverrides.blockOrder.slice(0, qrIdx + 1),
            ...orderedSubs,
            ...state.styleOverrides.blockOrder.slice(qrIdx + 1)
          ];
        } else {
          state.styleOverrides.blockOrder = [...missingOther, ...missingSubs, ...state.styleOverrides.blockOrder];
        }
      }
    }
    
    // Initialize hidden blocks
    if (!state.styleOverrides.hiddenBlocks) {
      state.styleOverrides.hiddenBlocks = [];
    }
    
    // Show button for "add removed block back" if any blocks are missing from order
    const allKeys = Object.keys(blockLabels);
    const removedBlocks = allKeys.filter(k => !state.styleOverrides.blockOrder.includes(k));
    if (removedBlocks.length > 0) {
      const addSection = el('div', { 
        style: { marginBottom: '8px', padding: '8px', background: 'rgba(176,74,26,.08)', borderRadius: '6px', border: '1px dashed rgba(176,74,26,.3)' } 
      });
      addSection.appendChild(el('div', { 
        style: { fontSize: '10px', color: 'var(--burnt)', marginBottom: '4px' } 
      }, '➕ إضافة عناصر محذوفة:'));
      removedBlocks.forEach(key => {
        const addBtn = el('button', {
          style: {
            padding: '4px 8px',
            margin: '2px',
            background: 'var(--bg-card)',
            border: '1px solid var(--burnt)',
            borderRadius: '4px',
            color: 'var(--cream-50)',
            cursor: 'pointer',
            fontSize: '10px',
            fontFamily: 'var(--font-ar-body)',
          },
          onclick: () => {
            state.styleOverrides.blockOrder.push(key);
            renderDoc();
            renderPanel();
          }
        }, blockLabels[key]);
        addSection.appendChild(addBtn);
      });
      reorderSection.appendChild(addSection);
    }
    
    const reorderList = el('div', { 
      id: 'block-reorder-list',
      style: { display: 'flex', flexDirection: 'column', gap: '4px', position: 'relative' } 
    });
    
    state.styleOverrides.blockOrder.forEach((blockKey, idx) => {
      const item = el('div', {
        class: 'block-reorder-item',
        'data-block-key': blockKey,
        'data-block-idx': idx,
        style: {
          display: 'flex',
          alignItems: 'center',
          gap: '6px',
          padding: '8px',
          background: 'var(--bg-card)',
          border: '1px solid var(--border)',
          borderRadius: '6px',
          fontSize: '12px',
          cursor: 'grab',
          touchAction: 'none',
          userSelect: 'none',
          transition: 'all .15s, transform .2s',
        }
      });
      
      // Drag handle (grip icon — also acts as visual cue)
      const grip = el('div', {
        style: {
          display: 'flex',
          flexDirection: 'column',
          gap: '2px',
          padding: '2px 4px',
          color: 'var(--gold-light)',
          cursor: 'grab',
          opacity: '0.7',
          fontSize: '10px',
          lineHeight: '0.6',
        },
        html: '⋮⋮',
        title: 'اسحبي لتغيير الترتيب',
      });
      grip.innerHTML = `
        <svg viewBox="0 0 12 18" width="12" height="14" style="display:block;color:currentColor" fill="currentColor">
          <circle cx="3" cy="3" r="1.5"/><circle cx="9" cy="3" r="1.5"/>
          <circle cx="3" cy="9" r="1.5"/><circle cx="9" cy="9" r="1.5"/>
          <circle cx="3" cy="15" r="1.5"/><circle cx="9" cy="15" r="1.5"/>
        </svg>`;
      item.appendChild(grip);
      
      // Order number
      item.appendChild(el('div', { 
        class: 'block-reorder-num',
        style: { 
          width: '22px', height: '22px', 
          background: 'var(--gold)', color: '#fff', 
          borderRadius: '50%', 
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: 'var(--font-en-display)', fontSize: '11px', fontWeight: '700',
          flexShrink: '0',
        } 
      }, String(idx + 1)));
      
      // Label
      item.appendChild(el('div', { style: { flex: '1', color: 'var(--text)' } }, blockLabels[blockKey] || blockKey));
      
      // Move up button
      const upBtn = el('button', {
        style: { 
          width: '26px', height: '26px', 
          background: 'rgba(201,169,110,0.1)', 
          border: '1px solid var(--border)', 
          borderRadius: '4px',
          color: idx === 0 ? 'var(--text-soft)' : 'var(--gold-light)',
          cursor: idx === 0 ? 'not-allowed' : 'pointer',
          opacity: idx === 0 ? '0.4' : '1',
          fontSize: '12px',
          flexShrink: '0',
        },
        onclick: (e) => {
          e.stopPropagation();
          if (idx === 0) return;
          const order = state.styleOverrides.blockOrder;
          [order[idx], order[idx-1]] = [order[idx-1], order[idx]];
          renderDoc();
          renderPanel();
        }
      }, '▲');
      item.appendChild(upBtn);
      
      // Move down button
      const downBtn = el('button', {
        style: { 
          width: '26px', height: '26px', 
          background: 'rgba(201,169,110,0.1)', 
          border: '1px solid var(--border)', 
          borderRadius: '4px',
          color: idx === state.styleOverrides.blockOrder.length - 1 ? 'var(--text-soft)' : 'var(--gold-light)',
          cursor: idx === state.styleOverrides.blockOrder.length - 1 ? 'not-allowed' : 'pointer',
          opacity: idx === state.styleOverrides.blockOrder.length - 1 ? '0.4' : '1',
          fontSize: '12px',
          flexShrink: '0',
        },
        onclick: (e) => {
          e.stopPropagation();
          if (idx === state.styleOverrides.blockOrder.length - 1) return;
          const order = state.styleOverrides.blockOrder;
          [order[idx], order[idx+1]] = [order[idx+1], order[idx]];
          renderDoc();
          renderPanel();
        }
      }, '▼');
      item.appendChild(downBtn);
      
      // Hide/show toggle (eye icon)
      const isHidden = state.styleOverrides.hiddenBlocks.includes(blockKey);
      const hideBtn = el('button', {
        title: isHidden ? 'إظهار العنصر' : 'إخفاء العنصر',
        style: { 
          width: '26px', height: '26px', 
          background: isHidden ? 'rgba(176,74,26,.18)' : 'rgba(201,169,110,0.1)', 
          border: `1px solid ${isHidden ? 'var(--burnt)' : 'var(--border)'}`, 
          borderRadius: '4px',
          color: isHidden ? 'var(--burnt)' : 'var(--gold-light)',
          cursor: 'pointer',
          fontSize: '11px',
          flexShrink: '0',
          padding: '0',
        },
        onclick: (e) => {
          e.stopPropagation();
          const hidden = state.styleOverrides.hiddenBlocks;
          if (isHidden) {
            const i = hidden.indexOf(blockKey);
            if (i >= 0) hidden.splice(i, 1);
          } else {
            hidden.push(blockKey);
          }
          renderDoc();
          renderPanel();
        }
      }, isHidden ? '⊘' : '👁');
      item.appendChild(hideBtn);
      
      // Remove button (X) — removes from order entirely
      const removeBtn = el('button', {
        title: 'حذف العنصر من القائمة',
        style: { 
          width: '26px', height: '26px', 
          background: 'rgba(176,74,26,0.08)', 
          border: '1px solid rgba(176,74,26,0.3)', 
          borderRadius: '4px',
          color: 'var(--burnt)',
          cursor: 'pointer',
          fontSize: '13px',
          flexShrink: '0',
          padding: '0',
          fontWeight: '700',
        },
        onclick: (e) => {
          e.stopPropagation();
          const order = state.styleOverrides.blockOrder;
          order.splice(idx, 1);
          // Also remove from hidden if it was hidden
          const hi = state.styleOverrides.hiddenBlocks.indexOf(blockKey);
          if (hi >= 0) state.styleOverrides.hiddenBlocks.splice(hi, 1);
          renderDoc();
          renderPanel();
        }
      }, '✕');
      item.appendChild(removeBtn);
      
      // Style hidden items
      if (isHidden) {
        item.style.opacity = '0.5';
        item.style.background = 'rgba(176,74,26,.05)';
      }
      
      reorderList.appendChild(item);
    });
    
    reorderSection.appendChild(reorderList);
    
    // Setup drag-and-drop after items are appended
    setTimeout(() => setupBlockDragAndDrop(reorderList), 0);
    
    // Reset button
    const resetBtn = el('button', {
      style: {
        width: '100%',
        padding: '8px',
        marginTop: '8px',
        background: 'transparent',
        border: '1px dashed var(--border)',
        borderRadius: '6px',
        color: 'var(--text-soft)',
        cursor: 'pointer',
        fontSize: '11px',
        fontFamily: 'var(--font-ar-body)',
      },
      onclick: () => {
        state.styleOverrides.blockOrder = ['smallHeader', 'stars', 'mainTitle', 'sub', 'divider', 'description', 'qr', 'thankYou', 'brand'];
        renderDoc();
        renderPanel();
      }
    }, '↺ إعادة الترتيب الافتراضي');
    reorderSection.appendChild(resetBtn);
    
    content.appendChild(reorderSection);
  }
  
  // Reset-all-positions button (only show if there are any offsets)
  const hasOffsets = state.elementOffsets && Object.keys(state.elementOffsets).some(k => {
    const o = state.elementOffsets[k];
    if (typeof o === 'number') return o !== 0;
    return o && (o.x !== 0 || o.y !== 0);
  });
  if (hasOffsets) {
    const resetAllBtn = el('button', {
      style: {
        width: '100%',
        padding: '8px 12px',
        marginTop: '8px',
        background: 'rgba(176,74,26,0.08)',
        border: '1px dashed var(--burnt)',
        borderRadius: '6px',
        color: 'var(--burnt)',
        cursor: 'pointer',
        fontSize: '11px',
        fontFamily: 'var(--font-ar-body)',
      },
      onclick: () => {
        state.elementOffsets = {};
        // Clear transforms on all fields immediately
        const stage = $('#doc-stage');
        if (stage) {
          stage.querySelectorAll('.doc-field').forEach(f => { f.style.transform = ''; });
        }
        renderDoc();
        renderPanel();
      }
    }, '↺ إعادة كل المواضع للأصل');
    content.appendChild(resetAllBtn);
  }
  
  content.appendChild(el('div', { 
    style: { padding: '10px 8px', fontSize: '11px', color: 'var(--text-soft)', lineHeight: '1.6', textAlign: 'center', background: 'rgba(201,169,110,0.05)', borderRadius: '6px', marginTop: '12px' } 
  }, '💡 انقري على أي نص للتحرير · انقري واسحبي لتحريك العنصر في أي اتجاه · شريط التنسيق العائم يظهر أسفل الشاشة عند التحديد'));
}

function renderItemsField(section, field) {
  const items = state.content[field.key] || [];
  
  section.appendChild(el('label', { class: 'control-label', style: { fontWeight: '600', color: 'var(--gold-light)', marginBottom: '8px' } }, field.label));
  
  items.forEach((item, idx) => {
    const itemCard = el('div', {
      style: { 
        background: 'var(--bg-card)', 
        border: '1px solid var(--border)', 
        borderRadius: '6px', 
        padding: '8px', 
        marginBottom: '8px',
        position: 'relative',
      }
    });
    
    const removeBtn = el('button', {
      style: { 
        position: 'absolute', top: '4px', left: '4px',
        background: 'transparent', border: 'none',
        color: 'var(--burnt)', cursor: 'pointer', fontSize: '14px',
        width: '20px', height: '20px', borderRadius: '50%',
      },
      onclick: () => { items.splice(idx, 1); renderDoc(); renderPanel(); }
    }, '×');
    itemCard.appendChild(removeBtn);
    
    const descInput = el('input', {
      class: 'control-input',
      type: 'text',
      placeholder: 'وصف الخدمة',
      value: item.desc,
      style: { marginBottom: '6px' }
    });
    descInput.addEventListener('input', e => { item.desc = e.target.value; renderDoc(); });
    itemCard.appendChild(descInput);
    
    const qpRow = el('div', { class: 'control-row-2', style: { marginBottom: 0 } });
    const qtyInput = el('input', { class: 'control-input', type: 'number', placeholder: 'الكمية', value: item.qty, min: 1 });
    qtyInput.addEventListener('input', e => { item.qty = +e.target.value; renderDoc(); });
    const priceInput = el('input', { class: 'control-input', type: 'number', placeholder: 'السعر', value: item.price, min: 0, step: 0.01 });
    priceInput.addEventListener('input', e => { item.price = +e.target.value; renderDoc(); });
    qpRow.appendChild(qtyInput);
    qpRow.appendChild(priceInput);
    itemCard.appendChild(qpRow);
    
    section.appendChild(itemCard);
  });
  
  const addBtn = el('button', {
    class: 'btn',
    style: { width: '100%', justifyContent: 'center' },
    onclick: () => {
      items.push({ desc: 'خدمة جديدة', qty: 1, price: 100 });
      state.content[field.key] = items;
      renderDoc();
      renderPanel();
    }
  }, '+ إضافة بند');
  section.appendChild(addBtn);
}

function renderStylePanel(content) {
  const tpl = TEMPLATES[state.currentTemplate];
  
  // ─── Background section ───
  const bgSection = el('div', { class: 'panel-section' });
  bgSection.appendChild(el('div', { class: 'panel-section-title' }, 'خلفية الصفحة'));
  
  const bgRow = el('div', { class: 'control-row' });
  bgRow.appendChild(el('label', { class: 'control-label' }, 'لون الخلفية'));
  const bgGrid = el('div', { class: 'color-pickers' });
  ['default', ...BRAND.palette].forEach(c => {
    const sw = el('div', {
      class: 'color-swatch' + (state.styleOverrides.bg === c || (c === 'default' && !state.styleOverrides.bg) ? ' active' : ''),
      style: { 
        background: c === 'default' ? 'repeating-linear-gradient(45deg, #444 0 6px, #222 6px 12px)' : c 
      },
      onclick: () => {
        state.styleOverrides.bg = c === 'default' ? null : c;
        renderDoc();
        renderPanel();
      }
    });
    if (c === 'default') sw.title = 'الافتراضي';
    bgGrid.appendChild(sw);
  });
  bgRow.appendChild(bgGrid);
  bgSection.appendChild(bgRow);
  content.appendChild(bgSection);
  
  // ─── Font controls per field ───
  const fieldSection = el('div', { class: 'panel-section' });
  fieldSection.appendChild(el('div', { class: 'panel-section-title' }, 'تخصيص الخطوط'));
  
  // Field selector
  const fieldSelRow = el('div', { class: 'control-row' });
  fieldSelRow.appendChild(el('label', { class: 'control-label' }, 'اختاري الحقل للتعديل'));
  const fieldSel = el('select', { class: 'control-select' });
  fieldSel.appendChild(el('option', { value: '' }, '— اختاري حقلاً —'));
  
  (tpl.fields || []).filter(f => f.type !== 'items' && f.type !== 'number').forEach(f => {
    const opt = el('option', { value: f.key }, f.label);
    if (state.selectedField === f.key) opt.selected = true;
    fieldSel.appendChild(opt);
  });
  
  fieldSel.addEventListener('change', e => {
    state.selectedField = e.target.value || null;
    renderDoc();
    renderPanel();
  });
  fieldSelRow.appendChild(fieldSel);
  fieldSection.appendChild(fieldSelRow);
  
  // If a field is selected, show its font controls
  if (state.selectedField) {
    const key = state.selectedField;
    const override = state.fontOverrides[key] || {};
    
    // Hint
    fieldSection.appendChild(el('div', { 
      style: { background: 'rgba(201,169,110,.08)', padding: '8px 10px', borderRadius: '4px', fontSize: '10px', color: 'var(--gold-light)', marginBottom: '12px', textAlign: 'center' }
    }, `يتم التعديل على: ${(tpl.fields.find(f=>f.key===key)||{}).label || key}`));
    
    // Font family
    const famRow = el('div', { class: 'control-row' });
    famRow.appendChild(el('label', { class: 'control-label' }, 'نوع الخط'));
    const famSel = el('select', { class: 'control-select' });
    famSel.appendChild(el('option', { value: '' }, 'الافتراضي'));
    FONTS.forEach(f => {
      const o = el('option', { value: f.css }, f.label);
      if (override.family === f.css) o.selected = true;
      famSel.appendChild(o);
    });
    famSel.addEventListener('change', e => {
      const o = state.fontOverrides[key] || {};
      if (e.target.value) o.family = e.target.value;
      else delete o.family;
      state.fontOverrides[key] = o;
      renderDoc();
    });
    famRow.appendChild(famSel);
    fieldSection.appendChild(famRow);
    
    // Font size — slider + number input
    const sizeRow = el('div', { class: 'control-row' });
    sizeRow.appendChild(el('label', { class: 'control-label' }, `حجم الخط: ${override.size || 'الافتراضي'} ${override.size ? 'pt' : ''}`));
    const sizeWrap = el('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } });
    const sizeSlider = el('input', { 
      type: 'range', min: 6, max: 72, value: override.size || 14, 
      style: { flex: '1' } 
    });
    const sizeNum = el('input', { 
      type: 'number', min: 6, max: 200, value: override.size || 14, 
      class: 'control-input',
      style: { width: '60px', padding: '4px 6px' }
    });
    sizeSlider.addEventListener('input', e => {
      const v = +e.target.value;
      sizeNum.value = v;
      const o = state.fontOverrides[key] || {};
      o.size = v;
      state.fontOverrides[key] = o;
      sizeRow.querySelector('.control-label').textContent = `حجم الخط: ${v}pt`;
      renderDoc();
    });
    sizeNum.addEventListener('input', e => {
      const v = +e.target.value;
      sizeSlider.value = v;
      const o = state.fontOverrides[key] || {};
      o.size = v;
      state.fontOverrides[key] = o;
      sizeRow.querySelector('.control-label').textContent = `حجم الخط: ${v}pt`;
      renderDoc();
    });
    sizeWrap.appendChild(sizeSlider);
    sizeWrap.appendChild(sizeNum);
    sizeRow.appendChild(sizeWrap);
    fieldSection.appendChild(sizeRow);
    
    // Weight + style
    const ws_row = el('div', { class: 'control-row-2' });
    const wDiv = el('div', {});
    wDiv.appendChild(el('label', { class: 'control-label' }, 'الوزن'));
    const wSel = el('select', { class: 'control-select' });
    wSel.appendChild(el('option', { value: '' }, 'افتراضي'));
    FONT_WEIGHTS.forEach(w => {
      const o = el('option', { value: w.val }, w.label);
      if (override.weight == w.val) o.selected = true;
      wSel.appendChild(o);
    });
    wSel.addEventListener('change', e => {
      const o = state.fontOverrides[key] || {};
      if (e.target.value) o.weight = +e.target.value;
      else delete o.weight;
      state.fontOverrides[key] = o;
      renderDoc();
    });
    wDiv.appendChild(wSel);
    ws_row.appendChild(wDiv);
    
    const sDiv = el('div', {});
    sDiv.appendChild(el('label', { class: 'control-label' }, 'النمط'));
    const sSel = el('select', { class: 'control-select' });
    [
      { v: '', l: 'افتراضي' },
      { v: 'normal', l: 'عادي' },
      { v: 'italic', l: 'مائل' },
    ].forEach(opt => {
      const o = el('option', { value: opt.v }, opt.l);
      if ((override.style || '') === opt.v) o.selected = true;
      sSel.appendChild(o);
    });
    sSel.addEventListener('change', e => {
      const o = state.fontOverrides[key] || {};
      if (e.target.value) o.style = e.target.value;
      else delete o.style;
      state.fontOverrides[key] = o;
      renderDoc();
    });
    sDiv.appendChild(sSel);
    ws_row.appendChild(sDiv);
    fieldSection.appendChild(ws_row);
    
    // Color
    const colorRow = el('div', { class: 'control-row' });
    colorRow.appendChild(el('label', { class: 'control-label' }, 'لون النص'));
    const colorGrid = el('div', { class: 'color-pickers' });
    ['default', ...BRAND.palette].forEach(c => {
      const sw = el('div', {
        class: 'color-swatch' + (override.color === c || (c === 'default' && !override.color) ? ' active' : ''),
        style: { 
          background: c === 'default' ? 'repeating-linear-gradient(45deg, #444 0 6px, #222 6px 12px)' : c 
        },
        onclick: () => {
          const o = state.fontOverrides[key] || {};
          if (c === 'default') delete o.color;
          else o.color = c;
          state.fontOverrides[key] = o;
          renderDoc();
          renderPanel();
        }
      });
      if (c === 'default') sw.title = 'الافتراضي';
      colorGrid.appendChild(sw);
    });
    colorRow.appendChild(colorGrid);
    fieldSection.appendChild(colorRow);
    
    // Letter spacing
    const lsRow = el('div', { class: 'control-row' });
    lsRow.appendChild(el('label', { class: 'control-label' }, `تباعد الأحرف: ${override.letterSpacing ?? 0}pt`));
    const lsSlider = el('input', { 
      type: 'range', min: -2, max: 20, step: 0.5, value: override.letterSpacing ?? 0, 
      style: { width: '100%' } 
    });
    lsSlider.addEventListener('input', e => {
      const v = +e.target.value;
      const o = state.fontOverrides[key] || {};
      if (v === 0) delete o.letterSpacing;
      else o.letterSpacing = v;
      state.fontOverrides[key] = o;
      lsRow.querySelector('.control-label').textContent = `تباعد الأحرف: ${v}pt`;
      renderDoc();
    });
    lsRow.appendChild(lsSlider);
    fieldSection.appendChild(lsRow);
    
    // Reset button
    const resetBtn = el('button', {
      class: 'btn',
      style: { width: '100%', marginTop: '8px', justifyContent: 'center' },
      onclick: () => {
        delete state.fontOverrides[key];
        renderDoc();
        renderPanel();
      }
    }, '↺ إعادة تعيين الافتراضي');
    fieldSection.appendChild(resetBtn);
  } else {
    fieldSection.appendChild(el('div', { 
      style: { padding: '20px 10px', textAlign: 'center', color: 'var(--text-soft)', fontSize: '11px', lineHeight: '1.7' }
    }, 'اختاري حقلاً من القائمة أعلاه، أو انقري مباشرة على أي نص في المستند لتخصيص خطه'));
  }
  
  content.appendChild(fieldSection);

function applyZoom() {
  $('#doc-stage').style.transform = `scale(${state.zoom})`;
  $('#zoom-display').textContent = Math.round(state.zoom * 100) + '%';
}
function fitZoom() {
  if (!state.currentTemplate) return;
  const tpl = TEMPLATES[state.currentTemplate];
  const viewport = $('#canvas-viewport');
  const vw = viewport.clientWidth - 80;
  const vh = viewport.clientHeight - 80;
  const sw = mmToPx(tpl.sizeMm[0]);
  const sh = mmToPx(tpl.sizeMm[1]);
  state.zoom = Math.min(vw/sw, vh/sh) * 0.92;
  applyZoom();
}

// ═══════════ V2 HELPERS ═══════════
async function renderPageToCanvas(scale = 2, pageIndex = 0) {
  // Find target page
  const stage = document.getElementById('doc-stage');
  let page = stage.querySelector(`[data-page-index="${pageIndex}"]`);
  if (!page) page = document.getElementById('doc-page');
  if (!state.currentTemplate) throw new Error('No template loaded');
  const tpl = TEMPLATES[state.currentTemplate];
  const pxW = mmToPx(tpl.sizeMm[0]);
  const pxH = mmToPx(tpl.sizeMm[1]);
  
  // Wait for fonts to be ready
  if (document.fonts && document.fonts.ready) {
    await document.fonts.ready;
  }
  
  // Try primary method: foreignObject SVG → Image → Canvas
  try {
    return await renderViaSVGForeignObject(scale, pxW, pxH, page);
  } catch (err) {
    console.warn('Primary render failed (likely tainted canvas), trying screenshot-based fallback:', err.message);
    throw err;
  }
}

async function renderViaSVGForeignObject(scale, pxW, pxH, sourcePage) {
  const page = sourcePage || document.getElementById('doc-page');
  
  // Clone the page with all its content (stamp included)
  const clone = page.cloneNode(true);
  
  // Remove editing artifacts
  clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
  clone.querySelectorAll('.doc-field').forEach(el => {
    el.classList.remove('doc-field', 'field-selected');
  });
  clone.querySelectorAll('.stamp-handle').forEach(el => el.remove());
  clone.querySelectorAll('.stamp-overlay.selected').forEach(el => el.classList.remove('selected'));
  
  const svgNS = 'http://www.w3.org/2000/svg';
  const wrapperSvg = document.createElementNS(svgNS, 'svg');
  wrapperSvg.setAttribute('xmlns', svgNS);
  wrapperSvg.setAttribute('xmlns:xhtml', 'http://www.w3.org/1999/xhtml');
  wrapperSvg.setAttribute('width', pxW);
  wrapperSvg.setAttribute('height', pxH);
  wrapperSvg.setAttribute('viewBox', `0 0 ${pxW} ${pxH}`);
  
  // Embed ALL sprite symbols
  const defs = document.createElementNS(svgNS, 'defs');
  const sprite = document.getElementById('svg-sprite');
  sprite.querySelectorAll('symbol').forEach(sym => {
    defs.appendChild(sym.cloneNode(true));
  });
  wrapperSvg.appendChild(defs);
  
  const fo = document.createElementNS(svgNS, 'foreignObject');
  fo.setAttribute('x', 0);
  fo.setAttribute('y', 0);
  fo.setAttribute('width', pxW);
  fo.setAttribute('height', pxH);
  
  const xhtmlWrapper = document.createElementNS('http://www.w3.org/1999/xhtml', 'div');
  xhtmlWrapper.setAttribute('xmlns', 'http://www.w3.org/1999/xhtml');
  xhtmlWrapper.setAttribute('style', `width:${pxW}px;height:${pxH}px;direction:rtl;font-family:'Cairo','Amiri',sans-serif;background:#fff;position:relative;overflow:hidden`);
  
  clone.classList.remove('doc-page');
  clone.style.width = pxW + 'px';
  clone.style.height = pxH + 'px';
  clone.style.position = 'relative';
  clone.style.overflow = 'hidden';
  
  // Inline styles — NO @import (would taint canvas)
  const styleEl = document.createElementNS('http://www.w3.org/1999/xhtml', 'style');
  styleEl.textContent = `
    * { box-sizing: border-box; margin: 0; padding: 0; }
    .doc-field { background: transparent !important; outline: none !important; }
    .stamp-handle { display: none !important; }
  `;
  xhtmlWrapper.appendChild(styleEl);
  xhtmlWrapper.appendChild(clone);
  fo.appendChild(xhtmlWrapper);
  wrapperSvg.appendChild(fo);
  
  const serializer = new XMLSerializer();
  const svgString = '<?xml version="1.0" encoding="UTF-8"?>' + serializer.serializeToString(wrapperSvg);
  const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = pxW * scale;
      canvas.height = pxH * scale;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      try {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        // Test if canvas is tainted by trying toDataURL
        canvas.toDataURL('image/png');
        URL.revokeObjectURL(url);
        resolve(canvas);
      } catch (e) {
        URL.revokeObjectURL(url);
        reject(new Error('Canvas tainted by external resources. Try refreshing the page or check your internet connection.'));
      }
    };
    img.onerror = (e) => {
      URL.revokeObjectURL(url);
      reject(new Error('SVG rasterization failed'));
    };
    img.src = url;
  });
}

let _jspdfPromise = null;
function loadJsPDF() {
  if (_jspdfPromise) return _jspdfPromise;
  _jspdfPromise = new Promise((resolve, reject) => {
    if (window.jspdf?.jsPDF || window.jsPDF) {
      resolve(window.jspdf?.jsPDF || window.jsPDF);
      return;
    }
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    script.onload = () => resolve(window.jspdf?.jsPDF || window.jsPDF);
    script.onerror = () => reject(new Error('jsPDF load failed'));
    document.head.appendChild(script);
  });
  return _jspdfPromise;
}

// ═══════════ ROBUST EXPORT SYSTEM ═══════════
// Strategy: build SVG with inline embedded fonts (base64) to avoid tainted canvas

let _embeddedFontsCache = null;

async function getEmbeddedFonts() {
  if (_embeddedFontsCache !== null) return _embeddedFontsCache;
  
  // Try to fetch the brand fonts from Google Fonts as base64
  // If fails (offline/CORS), return null and use system fonts
  const fontUrls = {
    Cairo: 'https://fonts.gstatic.com/s/cairo/v28/SLXgc1nY6HkvalIhTpumxdt0UX8.woff2',
    Amiri: 'https://fonts.gstatic.com/s/amiri/v27/J7aRnpd8CGxBHpUrtLYS6pNLAjk.woff2',
    CormorantGaramond: 'https://fonts.gstatic.com/s/cormorantgaramond/v16/co3bmX5slCNuHLi8bLeY9MK7whWMhyjornFLsS6V7w.woff2',
  };
  
  const fonts = {};
  try {
    for (const [name, url] of Object.entries(fontUrls)) {
      try {
        const res = await fetch(url, { mode: 'cors' });
        if (!res.ok) continue;
        const buf = await res.arrayBuffer();
        const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
        fonts[name] = b64;
      } catch (e) {
        // Skip this font silently
      }
    }
  } catch (e) {
    // Network failure overall — return empty
  }
  
  _embeddedFontsCache = fonts;
  return fonts;
}

function buildEmbeddedFontCSS(fonts) {
  let css = '';
  if (fonts.Cairo) {
    css += `@font-face { font-family: 'Cairo'; src: url(data:font/woff2;base64,${fonts.Cairo}) format('woff2'); font-weight: 400; }\n`;
  }
  if (fonts.Amiri) {
    css += `@font-face { font-family: 'Amiri'; src: url(data:font/woff2;base64,${fonts.Amiri}) format('woff2'); font-weight: 400; }\n`;
  }
  if (fonts.CormorantGaramond) {
    css += `@font-face { font-family: 'Cormorant Garamond'; src: url(data:font/woff2;base64,${fonts.CormorantGaramond}) format('woff2'); font-weight: 400; }\n`;
  }
  return css;
}

// ─── Build a self-contained SVG of the entire page ───
async function buildExportSVG(pageIndex = 0) {
  // Find the requested page (defaults to first)
  const stage = document.getElementById('doc-stage');
  let page = stage.querySelector(`[data-page-index="${pageIndex}"]`);
  if (!page) page = document.getElementById('doc-page');
  if (!state.currentTemplate) throw new Error('No template loaded');
  const tpl = TEMPLATES[state.currentTemplate];
  const pxW = mmToPx(tpl.sizeMm[0]);
  const pxH = mmToPx(tpl.sizeMm[1]);
  
  // Wait for fonts loaded in parent doc
  if (document.fonts && document.fonts.ready) {
    await document.fonts.ready;
  }
  
  // Try to embed fonts inline (silent fail if offline)
  let embeddedFontCSS = '';
  try {
    const embeddedFonts = await getEmbeddedFonts();
    embeddedFontCSS = buildEmbeddedFontCSS(embeddedFonts);
  } catch (e) {
    // fall through with no fonts
  }
  
  // Clone the page
  const clone = page.cloneNode(true);
  clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
  clone.querySelectorAll('.doc-field').forEach(el => el.classList.remove('doc-field', 'field-selected'));
  clone.querySelectorAll('.stamp-handle').forEach(el => el.remove());
  clone.querySelectorAll('.stamp-overlay.selected').forEach(el => el.classList.remove('selected'));
  // Strip any external font references from the clone (just in case)
  clone.querySelectorAll('link[href*="fonts.googleapis"], link[href*="fonts.gstatic"]').forEach(el => el.remove());
  
  const svgNS = 'http://www.w3.org/2000/svg';
  const wrapperSvg = document.createElementNS(svgNS, 'svg');
  wrapperSvg.setAttribute('xmlns', svgNS);
  wrapperSvg.setAttribute('xmlns:xhtml', 'http://www.w3.org/1999/xhtml');
  wrapperSvg.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
  wrapperSvg.setAttribute('width', pxW);
  wrapperSvg.setAttribute('height', pxH);
  wrapperSvg.setAttribute('viewBox', `0 0 ${pxW} ${pxH}`);
  
  // Embed sprite symbols
  const defs = document.createElementNS(svgNS, 'defs');
  const sprite = document.getElementById('svg-sprite');
  sprite.querySelectorAll('symbol').forEach(sym => {
    defs.appendChild(sym.cloneNode(true));
  });
  wrapperSvg.appendChild(defs);
  
  // Background rect (so JPG conversion has white bg)
  const bgRect = document.createElementNS(svgNS, 'rect');
  bgRect.setAttribute('width', pxW);
  bgRect.setAttribute('height', pxH);
  bgRect.setAttribute('fill', '#ffffff');
  wrapperSvg.appendChild(bgRect);
  
  // ForeignObject with embedded fonts
  const fo = document.createElementNS(svgNS, 'foreignObject');
  fo.setAttribute('x', 0);
  fo.setAttribute('y', 0);
  fo.setAttribute('width', pxW);
  fo.setAttribute('height', pxH);
  
  const xhtmlWrapper = document.createElementNS('http://www.w3.org/1999/xhtml', 'div');
  xhtmlWrapper.setAttribute('xmlns', 'http://www.w3.org/1999/xhtml');
  xhtmlWrapper.setAttribute('style', `width:${pxW}px;height:${pxH}px;direction:rtl;font-family:'Cairo','Amiri',sans-serif;background:#fff;position:relative;overflow:hidden`);
  
  clone.classList.remove('doc-page');
  clone.style.width = pxW + 'px';
  clone.style.height = pxH + 'px';
  clone.style.position = 'relative';
  clone.style.overflow = 'hidden';
  
  // Inline styles — with embedded fonts when available
  const styleEl = document.createElementNS('http://www.w3.org/1999/xhtml', 'style');
  styleEl.textContent = `
    ${embeddedFontCSS}
    * { box-sizing: border-box; margin: 0; padding: 0; }
    .doc-field { background: transparent !important; outline: none !important; }
    .stamp-handle { display: none !important; }
  `;
  xhtmlWrapper.appendChild(styleEl);
  xhtmlWrapper.appendChild(clone);
  fo.appendChild(xhtmlWrapper);
  wrapperSvg.appendChild(fo);
  
  return { svg: wrapperSvg, width: pxW, height: pxH };
}

async function svgToCanvas(svgEl, width, height, scale = 2) {
  const serializer = new XMLSerializer();
  const svgString = '<?xml version="1.0" encoding="UTF-8"?>' + serializer.serializeToString(svgEl);
  
  // Use data URL (avoids blob's cross-origin context issues)
  const dataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);
  
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = width * scale;
      canvas.height = height * scale;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      try {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        // Test canvas isn't tainted
        canvas.toDataURL('image/png');
        resolve(canvas);
      } catch (e) {
        reject(new Error('Canvas tainted'));
      }
    };
    img.onerror = () => {
      reject(new Error('SVG load failed'));
    };
    img.src = dataUrl;
  });
}

// Deselect current field when clicking outside any selectable area
function handleClickOutside(e) {
  if (!state.selectedField) return;
  
  const target = e.target;
  // Ignore clicks inside any of these — they're part of the editing UI
  if (target.closest('[data-field]')) return;
  if (target.closest('#mobile-field-resizer')) return;
  if (target.closest('#field-resize-frame')) return;
  if (target.closest('.field-resize-handle')) return;
  if (target.closest('.panel')) return;
  if (target.closest('.sidebar')) return;
  if (target.closest('header.topbar')) return;
  if (target.closest('#login-overlay')) return;
  if (target.closest('#bfl-toast')) return;
  if (target.closest('.mobile-fab')) return;
  if (target.closest('.mobile-fab-bar')) return;
  if (target.closest('#mobile-backdrop')) return;
  if (target.closest('input, textarea, select, button, a')) return;
  
  // Outside any field-related UI → deselect
  // Set a guard flag so contenteditable re-focus doesn't undo this
  state._suppressFocus = Date.now();
  
  // Blur the previously selected field FIRST (before clearing state)
  const stage = document.getElementById('doc-stage');
  if (stage && state.selectedField) {
    const oldField = stage.querySelector(`[data-field="${state.selectedField}"]`);
    if (oldField) {
      oldField.classList.remove('field-selected');
      if (document.activeElement === oldField) oldField.blur();
    }
  }
  
  state.selectedField = null;
  hideMobileFieldResizer(); // also hides resize frame
  
  // Prevent default mousedown action to avoid contenteditable refocus
  // (only when click is on non-interactive area)
  if (target.id === 'canvas-viewport' || target.classList.contains('doc-stage-wrap') || target.id === 'doc-stage') {
    e.preventDefault();
  }
}

  document.body.appendChild(toolbar);
  
  // Position offset support — apply 2D transform
  if (!state.elementOffsets) state.elementOffsets = {};
  // Normalize existing legacy offset (number) to {x,y}
  const _o = state.elementOffsets[key];
  if (typeof _o === 'number') state.elementOffsets[key] = { x: 0, y: _o };
  const currentOffset = state.elementOffsets[key] || { x: 0, y: 0 };
  
  const applyOffset = (newOffset) => {
    state.elementOffsets[key] = newOffset;
    stage.querySelectorAll(`[data-field="${key}"]`).forEach(el => {
      if (!newOffset || (newOffset.x === 0 && newOffset.y === 0)) {
        el.style.transform = '';
      } else {
        el.style.transform = `translate(${newOffset.x}mm, ${newOffset.y}mm)`;
      }
    });
  };
  
  const moveBy = (dx, dy) => {
    const cur = state.elementOffsets[key];
    const c = (typeof cur === 'number') ? { x: 0, y: cur } : (cur || { x: 0, y: 0 });
    applyOffset({ x: (c.x || 0) + dx, y: (c.y || 0) + dy });

    setTimeout(() => updateFieldResizeFrame(fieldEl), 10);
  };
  
  document.getElementById('mfr-move-up').addEventListener('click', () => moveBy(0, -2));
  document.getElementById('mfr-move-down').addEventListener('click', () => moveBy(0, 2));
  document.getElementById('mfr-move-left').addEventListener('click', () => moveBy(-2, 0));
  document.getElementById('mfr-move-right').addEventListener('click', () => moveBy(2, 0));
  document.getElementById('mfr-pos-reset').addEventListener('click', () => {
    // Reset position
    applyOffset({ x: 0, y: 0 });
    // Reset scale
    if (state.elementScale && state.elementScale[key]) {
      delete state.elementScale[key];
      applyFieldTransform(key);
    }
    // Update frame to match
    setTimeout(() => updateFieldResizeFrame(fieldEl), 10);
  });
  
  const updateSize = (delta) => {
    const newSize = Math.max(6, Math.min(200, currentSize + delta));
    currentSize = newSize;
    state.fontOverrides[key] = state.fontOverrides[key] || {};
    state.fontOverrides[key].size = newSize;
    stage.querySelectorAll(`[data-field="${key}"]`).forEach(el => {

    });

    state.elementOffsets = state.elementOffsets || {};
    if (!state.elementOffsets[key]) state.elementOffsets[key] = { x: 0, y: 0 };
    if (typeof state.elementOffsets[key] === 'number') {

    }
    if (z == null) {
      delete state.elementOffsets[key].z;
    } else {
      state.elementOffsets[key].z = z;

  const updateLayerBtnState = () => {
    const o = state.elementOffsets && state.elementOffsets[key];
    const z = (o && typeof o === 'object') ? o.z : null;

    const backBtn = document.getElementById('mfr-layer-back');

      frontBtn.style.color = '#1a1209';
      frontBtn.style.fontWeight = 'bold';
    } else if (z != null && z <= 0) {

      backBtn.style.background = 'var(--gold-light)';
      backBtn.style.color = '#1a1209';
      backBtn.style.fontWeight = 'bold';
    }
  };
  
  document.getElementById('mfr-layer-front').addEventListener('click', () => {
    const o = state.elementOffsets && state.elementOffsets[key];
    const currentZ = (o && typeof o === 'object') ? o.z : null;
    // Toggle: if already front (>=10), reset to default; else go front
    if (currentZ != null && currentZ >= 10) {
      applyLayerZ(null);
    } else {
      applyLayerZ(99);
    }
  });
  
  document.getElementById('mfr-layer-back').addEventListener('click', () => {
    const o = state.elementOffsets && state.elementOffsets[key];
    const currentZ = (o && typeof o === 'object') ? o.z : null;
    // Toggle: if already back (<=0), reset to default; else go back
    if (currentZ != null && currentZ <= 0) {
      applyLayerZ(null);
    } else {
      applyLayerZ(0);
    }
  });
  
  // Initialize button state
  updateLayerBtnState();
  
  // Show resize handles frame on the selected field
  showFieldResizeFrame(fieldEl, key);
}

let _toastTimer = null;
function showToast(message, duration = 1400) {
  let toast = document.getElementById('bfl-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'bfl-toast';
    toast.style.cssText = `
      position:fixed;
      bottom:130px;
      left:50%;
      transform:translateX(-50%) translateY(20px);

      font-weight:600;
      border:1px solid rgba(201,169,110,0.4);

      z-index:10000;
      pointer-events:none;
      opacity:0;
      transition:opacity .25s, transform .25s;
      white-space:nowrap;
    `;
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  // Trigger animation
  requestAnimationFrame(() => {
    toast.style.opacity = '1';
    toast.style.transform = 'translateX(-50%) translateY(0)';
  });
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) translateY(20px)';
  }, duration);
}

function applyFieldTransform(key) {
  const stage = document.getElementById('doc-stage');
  if (!stage) return;
  stage.querySelectorAll(`[data-field="${key}"]`).forEach(el => {
    const offset = state.elementOffsets && state.elementOffsets[key];
    let x = 0, y = 0, z = null;
    if (offset != null) {
      if (typeof offset === 'number') y = offset;
      else if (typeof offset === 'object') {
        x = offset.x || 0;
        y = offset.y || 0;
        z = offset.z;
      }
    }
    const scale = state.elementScale && state.elementScale[key];
    
    const parts = [];
    if (x !== 0 || y !== 0) parts.push(`translate(${x}mm, ${y}mm)`);
    if (scale && scale !== 1) parts.push(`scale(${scale})`);
    
    if (parts.length) {
      el.style.transform = parts.join(' ');
      el.style.transformOrigin = 'center center';
    } else {
      el.style.transform = '';
    }
    
    if (z != null) {
      el.style.position = 'relative';
      el.style.zIndex = String(z);
    }
  });
}

function showFieldResizeFrame(fieldEl, key) {
  hideFieldResizeFrame();
  if (!fieldEl) return;
  
  const rect = fieldEl.getBoundingClientRect();
  if (rect.width < 4 || rect.height < 4) return;
  
  const frame = document.createElement('div');
  frame.id = 'field-resize-frame';
  frame.dataset.fieldKey = key;
  frame.style.cssText = `
    position:fixed;
    left:${rect.left - 2}px;
    top:${rect.top - 2}px;
    width:${rect.width + 4}px;
    height:${rect.height + 4}px;
    pointer-events:none;
    border:1.5px dashed rgba(201,169,110,0.85);
    box-shadow:0 0 0 1px rgba(255,255,255,0.4);
    z-index:9998;
    box-sizing:border-box;
    border-radius:2px;
  `;
  
  // 4 corner handles
  const corners = [
    { id: 'nw', top: '-7px', left: '-7px', cursor: 'nwse-resize' },
    { id: 'ne', top: '-7px', right: '-7px', cursor: 'nesw-resize' },
    { id: 'se', bottom: '-7px', right: '-7px', cursor: 'nwse-resize' },
    { id: 'sw', bottom: '-7px', left: '-7px', cursor: 'nesw-resize' },
  ];
  
  corners.forEach(c => {
    const h = document.createElement('div');
    h.className = 'field-resize-handle';
    h.dataset.corner = c.id;
    let style = `
      position:absolute;
      width:16px;height:16px;
      background:#c9a96e;
      border:2px solid #fbf7ef;
      border-radius:50%;
      box-shadow:0 2px 6px rgba(0,0,0,0.5);
      pointer-events:auto;
      cursor:${c.cursor};
      touch-action:none;
    `;
    if (c.top) style += `top:${c.top};`;
    if (c.bottom) style += `bottom:${c.bottom};`;
    if (c.left) style += `left:${c.left};`;
    if (c.right) style += `right:${c.right};`;
    h.style.cssText = style;
    
    const onStart = (e) => startFieldResize(e, key, c.id, fieldEl, frame);
    h.addEventListener('mousedown', onStart);
    h.addEventListener('touchstart', onStart, { passive: false });
    
    frame.appendChild(h);
  });
  
  // Size readout (during drag)
  const readout = document.createElement('div');
  readout.id = 'field-resize-readout';
  readout.style.cssText = `
    position:absolute;
    top:-26px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(42,28,16,0.92);
    color:#c9a96e;
    padding:3px 8px;
    border-radius:4px;
    font-family:var(--font-ar-body);
    font-size:11px;
    font-weight:600;
    white-space:nowrap;
    pointer-events:none;
    border:1px solid rgba(201,169,110,0.4);
    display:none;
  `;
  frame.appendChild(readout);
  
  document.body.appendChild(frame);
}

function updateFieldResizeFrame(fieldEl) {
  const frame = document.getElementById('field-resize-frame');
  if (!frame || !fieldEl) return;
  const rect = fieldEl.getBoundingClientRect();
  frame.style.left = (rect.left - 2) + 'px';
  frame.style.top = (rect.top - 2) + 'px';
  frame.style.width = (rect.width + 4) + 'px';
  frame.style.height = (rect.height + 4) + 'px';
}

function startFieldResize(e, key, corner, fieldEl, frame) {
  e.preventDefault();
  e.stopPropagation();
  
  const pt = e.touches ? e.touches[0] : e;
  const startX = pt.clientX;
  const startY = pt.clientY;
  
  state.elementScale = state.elementScale || {};
  const startScale = state.elementScale[key] || 1;
  
  const startRect = fieldEl.getBoundingClientRect();
  const diag = Math.sqrt(startRect.width * startRect.width + startRect.height * startRect.height);
  
  const readout = frame.querySelector('#field-resize-readout');
  if (readout) {
    readout.style.display = 'block';
    readout.textContent = `${Math.round(startScale * 100)}%`;
  }
  
  // Direction sign per corner: positive means "outward = bigger"
  const sx = corner === 'se' || corner === 'ne' ? 1 : -1;  // east=+ west=-
  const sy = corner === 'se' || corner === 'sw' ? 1 : -1;  // south=+ north=-
  
  function onMove(ev) {
    ev.preventDefault();
    const p = ev.touches ? ev.touches[0] : ev;
    const dx = (p.clientX - startX) * sx;
    const dy = (p.clientY - startY) * sy;
    
    // Use diagonal projection for uniform scale
    // Positive dx+dy = outward = bigger
    const delta = (dx + dy) / diag;
    let newScale = Math.max(0.3, Math.min(3.0, startScale * (1 + delta)));
    
    state.elementScale[key] = newScale;
    applyFieldTransform(key);
    
    // Update frame to match new bounds
    updateFieldResizeFrame(fieldEl);
    
    if (readout) {
      readout.textContent = `${Math.round(newScale * 100)}%`;
    }
  }
  
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
    if (readout) {
      setTimeout(() => { readout.style.display = 'none'; }, 600);
    }
    // If scale is essentially 1, clean up
    if (state.elementScale[key] && Math.abs(state.elementScale[key] - 1) < 0.02) {
      delete state.elementScale[key];
      applyFieldTransform(key);
      updateFieldResizeFrame(fieldEl);
    }
  }
  
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onUp);
}

function closeMobileDrawers() {
  document.querySelector('.sidebar')?.classList.remove('open');
  document.querySelector('.panel')?.classList.remove('open');
  document.getElementById('mobile-backdrop')?.classList.remove('show');
  document.querySelectorAll('.mobile-fab').forEach(f => f.classList.remove('active'));
}

function openSidebar() {
  closeMobileDrawers();
  document.querySelector('.sidebar')?.classList.add('open');
  document.getElementById('mobile-backdrop')?.classList.add('show');
  document.getElementById('fab-templates')?.classList.add('active');
}

function openPanel(tab) {
  closeMobileDrawers();
  if (tab) {
    state.activePanel = tab;
    document.querySelectorAll('.panel-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    renderPanel();
  }
  document.querySelector('.panel')?.classList.add('open');
  document.getElementById('mobile-backdrop')?.classList.add('show');
  document.getElementById('fab-' + (tab || 'content'))?.classList.add('active');
}

function setupMobileUI() {
  // FAB buttons
  $('#fab-templates')?.addEventListener('click', () => {
    const isOpen = document.querySelector('.sidebar')?.classList.contains('open');
    if (isOpen) closeMobileDrawers();
    else openSidebar();
  });
  
  $('#fab-content')?.addEventListener('click', () => {
    const isOpen = document.querySelector('.panel')?.classList.contains('open') 
      && state.activePanel === 'content';
    if (isOpen) closeMobileDrawers();
    else openPanel('content');
  });
  
  $('#fab-style')?.addEventListener('click', () => {
    const isOpen = document.querySelector('.panel')?.classList.contains('open') 
      && state.activePanel === 'style';
    if (isOpen) closeMobileDrawers();
    else openPanel('style');
  });
  
  $('#fab-stamp')?.addEventListener('click', () => {
    const isOpen = document.querySelector('.panel')?.classList.contains('open') 
      && state.activePanel === 'stamp';
    if (isOpen) closeMobileDrawers();
    else {
      // Enable stamp visibility when opening from FAB
      if (!state.stamp.visible) {
        state.stamp.visible = true;
        renderDoc();
      }
      openPanel('stamp');
    }
  });
  
  $('#fab-export')?.addEventListener('click', () => {
    showMobileExportMenu();
  });
  
  // Backdrop click closes drawers
  $('#mobile-backdrop')?.addEventListener('click', closeMobileDrawers);
  
  // When a template is picked, close the sidebar on mobile
  const origLoadTemplate = window.loadTemplate || loadTemplate;
  window.loadTemplate = function(id) {
    origLoadTemplate(id);
    if (isMobile()) {
      setTimeout(() => {
        closeMobileDrawers();
        // Auto-open content panel after picking a template
        openPanel('content');
      }, 200);
    }
  };
  
  // Bottom-sheet drag-down-to-close gesture
  const panel = document.querySelector('.panel');
  if (panel) {
    let startY = 0;
    let currentY = 0;
    let dragging = false;
    
    panel.addEventListener('touchstart', (e) => {
      if (!isMobile()) return;
      // Only allow drag from the top portion (handle area + tabs)
      const rect = panel.getBoundingClientRect();
      if (e.touches[0].clientY - rect.top > 60) return;
      startY = e.touches[0].clientY;
      currentY = startY;
      dragging = true;
      panel.style.transition = 'none';
    }, { passive: true });
    
    panel.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      currentY = e.touches[0].clientY;
      const dy = Math.max(0, currentY - startY);
      panel.style.transform = `translateY(${dy}px)`;
    }, { passive: true });
    
    panel.addEventListener('touchend', () => {
      if (!dragging) return;
      dragging = false;
      panel.style.transition = '';
      const dy = currentY - startY;
      if (dy > 80) {
        closeMobileDrawers();
        panel.style.transform = '';
      } else {
        panel.style.transform = '';
      }
    });
  }
}

function showMobileExportMenu() {
  // Show a bottom-sheet-style export options
  let menu = document.getElementById('mobile-export-menu');
  if (menu) { menu.remove(); }
  
  menu = document.createElement('div');
  menu.id = 'mobile-export-menu';
  Object.assign(menu.style, {
    position: 'fixed',
    bottom: '0',
    left: '0',
    right: '0',
    background: 'var(--bg-card)',
    borderTop: '1px solid var(--border)',
    borderRadius: '18px 18px 0 0',
    padding: '20px 16px 30px',
    zIndex: '200',
    boxShadow: '0 -10px 30px rgba(0,0,0,.5)',
    transform: 'translateY(100%)',
    transition: 'transform .25s',
  });
  
  const handle = document.createElement('div');
  Object.assign(handle.style, {
    width: '44px',
    height: '4px',
    background: 'var(--gold-light)',
    borderRadius: '2px',
    margin: '0 auto 16px',
    opacity: '0.6',
  });
  menu.appendChild(handle);
  
  const title = document.createElement('div');
  title.style.cssText = `
    font-family: var(--font-en-display);
    font-style: italic;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 16px;
  `;
  title.textContent = 'تصدير المطبوعة';
  menu.appendChild(title);
  
  const options = [
    { label: 'PNG · صورة عالية الجودة', icon: '🖼️', action: exportToPNG },
    { label: 'SVG · متجه قابل للتعديل', icon: '⬢', action: exportToSVG },
    { label: 'PDF · جاهز للطباعة', icon: '📄', action: exportToPDF },
    { label: 'Word · قابل للتحرير', icon: '📝', action: exportToWord },
    { label: 'إرسال عبر واتساب', icon: '💬', action: exportToWhatsApp },
    { label: 'مشاركة (Share)', icon: '↗', action: shareDesign },
  ];
  
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.style.cssText = `
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 8px;
      background: var(--bg-app);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--font-ar-body);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: right;
    `;
    btn.innerHTML = `<span style="font-size:20px">${opt.icon}</span> <span style="flex:1;text-align:right">${opt.label}</span>`;
    btn.addEventListener('click', () => {
      closeMobileExportMenu();
      opt.action();
    });
    menu.appendChild(btn);
  });
  
  const cancel = document.createElement('button');
  cancel.style.cssText = `
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-soft);
    font-family: var(--font-ar-body);
    font-size: 13px;
    cursor: pointer;
  `;
  cancel.textContent = 'إلغاء';
  cancel.addEventListener('click', closeMobileExportMenu);
  menu.appendChild(cancel);
  
  // Backdrop
  const backdrop = document.createElement('div');
  backdrop.id = 'mobile-export-backdrop';
  Object.assign(backdrop.style, {
    position: 'fixed',
    inset: '0',
    background: 'rgba(0,0,0,.5)',
    zIndex: '195',
    opacity: '0',
    transition: 'opacity .2s',
  });
  backdrop.addEventListener('click', closeMobileExportMenu);
  
  document.body.appendChild(backdrop);
  document.body.appendChild(menu);
  
  // Animate in
  requestAnimationFrame(() => {
    backdrop.style.opacity = '1';
    menu.style.transform = 'translateY(0)';
  });
}

function closeMobileExportMenu() {
  const menu = document.getElementById('mobile-export-menu');
  const backdrop = document.getElementById('mobile-export-backdrop');
  if (menu) {
    menu.style.transform = 'translateY(100%)';
    setTimeout(() => menu.remove(), 250);
  }
  if (backdrop) {
    backdrop.style.opacity = '0';
    setTimeout(() => backdrop.remove(), 250);
  }
}

// ════════ BOOT WITH AUTH GATE ════════
function initApp() {
  // Hide login if visible
  hideLoginOverlay();
  // Update user badge
  const user = getCurrentUser();
  if (user) updateUserBadge(user);
  // Run the main app init
  init();
}

function bootSequence() {
  setupLoginForm();
  const user = getCurrentUser();
  if (user) {
    // Already authenticated, boot directly
    initApp();
  } else {
    // Show login
    showLoginOverlay();
  }
}

document.addEventListener('DOMContentLoaded', bootSequence);

</script>
